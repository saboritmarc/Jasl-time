<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JASL Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0F14;color:#F1F5F9;font-family:-apple-system,sans-serif;min-height:100vh}
button,input,select{font-family:inherit}
.page{display:flex;flex-direction:column;min-height:100vh}
.top{background:#151820;border-bottom:1px solid #252B3A;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.body{flex:1;padding:16px;max-width:640px;margin:0 auto;width:100%}
.card{background:#1C2130;border:1px solid #252B3A;border-radius:14px;padding:18px;margin-bottom:12px}
.nav{background:#151820;border-top:1px solid #252B3A;display:flex;position:sticky;bottom:0;z-index:100}
.nav button{flex:1;padding:10px 4px;background:none;border:none;color:#475569;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav button.on{color:#3B82F6;font-weight:700}
.btnP{background:#3B82F6;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btnG{background:#22C55E;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;flex:1}
.btnY{background:#F59E0B;color:#000;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;flex:1}
.btnR{background:#EF4444;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;flex:1}
.btnGh{background:transparent;color:#94A3B8;border:1px solid #252B3A;border-radius:9px;padding:8px 14px;font-size:13px;cursor:pointer}
.inp{background:#151820;border:1px solid #252B3A;border-radius:10px;padding:12px;color:#F1F5F9;font-size:15px;width:100%;outline:none}
.brow{display:flex;gap:8px;margin-top:4px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #252B3A}
.stats{display:flex;gap:8px;margin-bottom:12px}
.stat{background:#151820;border-radius:10px;padding:12px;flex:1;text-align:center}
.sv{font-size:18px;font-weight:700}
.sl{font-size:10px;color:#94A3B8;margin-top:2px}
.clk{font-size:42px;font-weight:700;text-align:center;margin:8px 0;letter-spacing:-1px}
.h3{font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lbl{font-size:12px;color:#94A3B8;margin-bottom:4px;display:block}
.err{background:#EF444420;border:1px solid #EF444460;border-radius:8px;padding:10px;font-size:13px;color:#EF4444;margin-bottom:10px}
.inf{background:#3B82F620;border:1px solid #3B82F640;border-radius:8px;padding:10px;font-size:13px;color:#94A3B8;margin-bottom:10px}
.ld{text-align:center;padding:30px;color:#94A3B8;font-size:14px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;display:inline-block}
.tag{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;display:inline-block;border:1px solid transparent;margin-bottom:10px}
.av{border-radius:50%;background:#3B82F630;display:flex;align-items:center;justify-content:center;font-weight:700;color:#3B82F6;flex-shrink:0}
.hrow{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid #252B3A;gap:10px;cursor:pointer}
.erow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #252B3A;font-size:13px}
.tabs{display:flex;background:#151820;border-radius:10px;padding:3px;margin-bottom:12px;gap:3px}
.tab{flex:1;padding:7px;border-radius:8px;border:none;cursor:pointer;font-size:13px;color:#94A3B8;background:transparent}
.tab.on{background:#1C2130;color:#F1F5F9;font-weight:600}
.csm{background:#1C2130;border:1px solid #252B3A;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer}
</style>
</head>
<body>
<div id="app"><div class="ld">Carregant JASL Time...</div></div>
<script>
// ── API ─────────────────────────────────────────────────────────────────────
var SB  = "https://fywkafpfcnqynvjdedfj.supabase.co";
var KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5d2thZnBmY25xeW52amRlZGZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODY1MjQsImV4cCI6MjA4ODY2MjUyNH0.G5UDh7jrjlHkjoEMMsqPipzzIWTkvOEsbgdhd61vJiQ";

function sbFetch(method, table, query, body) {
var url = SB + “/rest/v1/” + table + (query ? “?” + query : “”);
var opts = {
method: method,
headers: {
“apikey”: KEY,
“Authorization”: “Bearer “ + KEY,
“Content-Type”: “application/json”,
“Prefer”: “return=representation”
}
};
if (body) opts.body = JSON.stringify(body);
return fetch(url, opts).then(function(r) {
return r.text().then(function(t) {
if (!r.ok) throw new Error(“HTTP “ + r.status + “: “ + t);
return t ? JSON.parse(t) : null;
});
});
}
function dbGet(t, q)    { return sbFetch(“GET”,    t, q,    null); }
function dbPost(t, b)   { return sbFetch(“POST”,   t, null, b);   }
function dbPatch(t, q, b){ return sbFetch(“PATCH”,  t, q,    b);   }

// ── UTILS ────────────────────────────────────────────────────────────────────
function pad(n)  { return String(n).padStart(2,“0”); }
function fmt(m)  { var s=m<0?”-”:”+”,a=Math.abs(m); return s+pad(Math.floor(a/60))+“h”+pad(a%60)+“m”; }
function fmtP(m) { return pad(Math.floor(m/60))+“h”+pad(m%60)+“m”; }
function fmtS(s) { return pad(Math.floor(s/3600))+”:”+pad(Math.floor((s%3600)/60))+”:”+pad(s%60); }
function now()   { var n=new Date(); return pad(n.getHours())+”:”+pad(n.getMinutes()); }
function today() { var d=new Date(); return d.getFullYear()+”-”+pad(d.getMonth()+1)+”-”+pad(d.getDate()); }
function dStr(d) { return new Date(d+“T12:00:00”).toLocaleDateString(“ca-ES”,{weekday:“short”,day:“numeric”,month:“short”}); }
function sc(s)   { return ({CLOSED:”#22C55E”,VACATION:”#A855F7”,SICK:”#F59E0B”,WEEKEND:”#475569”,OPEN:”#3B82F6”,NOT_STARTED:”#475569”})[s]||”#94A3B8”; }
function sl(s)   { return ({CLOSED:“Tancat”,VACATION:“Vacances”,SICK:“Baixa”,WEEKEND:“Cap de setmana”,OPEN:“En curs”,NOT_STARTED:“Pendent”})[s]||s; }
var EL = {START:“Inici”,END:“Final”,PAUSE_START:“Pausa”,PAUSE_END:“Represa”};

// ── DOM ──────────────────────────────────────────────────────────────────────
function el(tag, cls, style) {
var e = document.createElement(tag);
if (cls) e.className = cls;
if (style) e.style.cssText = style;
return e;
}
function txt(s) { return document.createTextNode(String(s||””)); }
function add(parent) {
for (var i=1; i<arguments.length; i++) {
var c = arguments[i];
if (c == null) continue;
parent.appendChild(typeof c === “string” ? txt(c) : c);
}
return parent;
}
function av(name, sz) {
var e = el(“div”,“av”,“width:”+sz+“px;height:”+sz+“px;font-size:”+(sz*0.38)+“px”);
e.textContent = (name||”?”).split(” “).map(function(n){return n[0];}).slice(0,2).join(””).toUpperCase();
return e;
}
function badge(t, c) { var e=el(“span”,“badge”); e.style.background=c+“22”; e.style.color=c; e.textContent=t; return e; }
function tag2(t, c)  { var e=el(“span”,“tag”);   e.style.background=c+“18”; e.style.color=c; e.style.borderColor=c+“44”; e.textContent=t; return e; }
function spin()      { var e=el(“div”,“ld”); e.textContent=“Carregant…”; return e; }
function errEl(m)    { var e=el(“div”,“err”); e.textContent=“Error: “+m; return e; }
function infEl(m)    { var e=el(“div”,“inf”); e.textContent=m; return e; }

// ── STATE ────────────────────────────────────────────────────────────────────
var ST = { screen:“splash”, worker:null, selDay:null };
var clkIv = null, elIv = null;

function go(updates) {
if (clkIv) { clearInterval(clkIv); clkIv=null; }
if (elIv)  { clearInterval(elIv);  elIv=null;  }
for (var k in updates) ST[k] = updates[k];
render();
}

// ── TOP BAR ──────────────────────────────────────────────────────────────────
function topBar(title, onBack, right) {
var t = el(“div”,“top”);
var back;
if (onBack) {
back = el(“button”,“btnGh”);
back.textContent = “Tornar”;
back.onclick = onBack;
} else {
back = el(“div”,””,“width:70px”);
}
var tt = el(“div”,””,“font-weight:700;font-size:16px”);
tt.textContent = title;
add(t, back, tt, right || el(“div”,””,“width:70px”));
return t;
}

// ── NAV BARS ─────────────────────────────────────────────────────────────────
function wNav(cur) {
var nav = el(“nav”,“nav”);
var items = [
[“workerHome”,“h”,“Avui”],
[“monthHistory”,“hi”,“Historial”],
[“permissions”,“p”,“Permisos”],
[“balance”,“b”,“Saldo”],
[“profile”,“pr”,“Perfil”]
];
items.forEach(function(it) {
var btn = el(“button”, cur===it[1]?“on”:””);
btn.textContent = it[2];
btn.onclick = function() { go({screen:it[0]}); };
add(nav, btn);
});
return nav;
}

function aNav(cur) {
var nav = el(“nav”,“nav”);
var items = [
[“adminHome”,“ah”,“Inici”],
[“workers”,“wk”,“Equip”],
[“records”,“rc”,“Registres”],
[“exports”,“ex”,“Exports”],
[“settings”,“st”,“Config.”]
];
items.forEach(function(it) {
var btn = el(“button”, cur===it[1]?“on”:””);
btn.textContent = it[2];
btn.onclick = function() { go({screen:it[0]}); };
add(nav, btn);
});
return nav;
}

// ════════════════════════════════════════════════════════════════════════════
// SPLASH
// ════════════════════════════════════════════════════════════════════════════
function pgSplash() {
var page = el(“div”,“page”,“justify-content:center;align-items:center;padding:32px”);
var box  = el(“div”,””,“text-align:center;max-width:300px”);
var ico  = el(“div”,””,“font-size:56px;margin-bottom:8px”); ico.textContent = “⏱”;
var ttl  = el(“div”,””,“font-size:26px;font-weight:800;margin-bottom:4px”);
ttl.innerHTML = ‘JASL<span style="color:#3B82F6">Time</span>’;
var sub  = el(“div”,””,“font-size:14px;color:#94A3B8;margin-bottom:32px”);
sub.textContent = “Registre de jornada”;
var btn  = el(“button”,“btnP”); btn.textContent = “Entrar amb codi”;
btn.onclick = function() { go({screen:“login”}); };
add(box, ico, ttl, sub, btn);
add(page, box);
return page;
}

// ════════════════════════════════════════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════════════════════════════════════════
function pgLogin() {
var page = el(“div”,“page”);
add(page, topBar(“JASL Time”, function(){ go({screen:“splash”}); }));
var body = el(“div”,“body”,“display:flex;flex-direction:column;justify-content:center”);
var errD = el(“div”);
var inp  = el(“input”,“inp”);
inp.type=“password”; inp.placeholder=“Codi personal”; inp.maxLength=20;
inp.style.cssText=“font-size:22px;text-align:center;letter-spacing:8px;margin-bottom:12px”;
var btn = el(“button”,“btnP”); btn.textContent = “Entrar”;

function doLogin() {
var code = inp.value.trim();
if (!code) return;
btn.textContent = “Verificant…”; btn.disabled = true; errD.innerHTML = “”;
dbGet(“workers”,“employee_code=eq.”+code+”&is_active=eq.true&select=*”)
.then(function(ws) {
if (ws && ws.length) {
go({worker:ws[0], screen: ws[0].role===“ADMIN” ? “adminHome” : “workerHome”});
} else {
add(errD, errEl(“Codi incorrecte o treballador inactiu.”));
btn.textContent=“Entrar”; btn.disabled=false;
}
}).catch(function(e) {
add(errD, errEl(e.message));
btn.textContent=“Entrar”; btn.disabled=false;
});
}

btn.onclick = doLogin;
inp.onkeydown = function(e) { if(e.key===“Enter”) doLogin(); };

var card = el(“div”,“card”,“text-align:center”);
var ico  = el(“div”,””,“font-size:36px;margin-bottom:8px”); ico.textContent=“🔐”;
var ttl  = el(“div”,””,“font-size:20px;font-weight:700;margin-bottom:4px”); ttl.textContent=“Identificacio”;
var sub  = el(“div”,””,“font-size:13px;color:#94A3B8;margin-bottom:18px”); sub.textContent=“Introdueix el teu codi personal”;
add(card, ico, ttl, sub, inp, errD, btn);
add(body, card);
add(page, body);
return page;
}

// ════════════════════════════════════════════════════════════════════════════
// WORKER HOME
// ════════════════════════════════════════════════════════════════════════════
function pgWorkerHome() {
var w = ST.worker;
var page = el(“div”,“page”);

var top = el(“div”,“top”);
var wi  = el(“div”,””,“display:flex;align-items:center;gap:10px”);
var wname = el(“div”,””,“font-size:13px;font-weight:600”); wname.textContent = w.display_name;
var wcode = el(“div”,””,“font-size:11px;color:#94A3B8”);  wcode.textContent = “#”+w.employee_code;
var winfo = el(“div”); add(winfo,wname,wcode);
add(wi, av(w.display_name,30), winfo);
var outBtn = el(“button”,“btnGh”); outBtn.textContent=“Sortir”;
outBtn.onclick = function() { go({screen:“splash”,worker:null}); };
add(top, wi, outBtn);
add(page, top);

var body = el(“div”,“body”);
var errD = el(“div”); add(body, errD);

// Clock card
var cc    = el(“div”,“card”,“text-align:center”);
var stTag = el(“div”,””,“margin-bottom:10px”);
var clkEl = el(“div”,“clk”); clkEl.textContent = now();
var subEl = el(“div”,””,“font-size:13px;color:#94A3B8;margin-bottom:14px”);
subEl.textContent = new Date().toLocaleDateString(“ca-ES”,{weekday:“long”,day:“numeric”,month:“long”});
var brow  = el(“div”,“brow”);
var ldEl  = el(“div”,””,“color:#94A3B8;padding:8px;text-align:center;font-size:13px”);
ldEl.textContent = “Carregant…”;
add(cc, stTag, clkEl, subEl, ldEl, brow);
add(body, cc);

// Entries
var ec     = el(“div”,“card”,“display:none”);
var eTitle = el(“div”,“h3”); eTitle.textContent = “Fitxades d’avui”;
var eRef   = el(“button”,“btnGh”,“font-size:11px;padding:3px 8px”); eRef.textContent=“↻”; eRef.onclick=load;
var eHead  = el(“div”,””,“display:flex;justify-content:space-between;margin-bottom:8px”);
add(eHead, eTitle, eRef);
var eList  = el(“div”);
add(ec, eHead, eList);
add(body, ec);

// Stats
var sr = el(“div”,“stats”,“display:none”);
add(body, sr);

add(page, body, wNav(“h”));

clkIv = setInterval(function(){ clkEl.textContent=now(); }, 1000);

var entries=[], summary=null, busy=false, elapsed=0;

function state() {
if (!entries.length) return “NOT_STARTED”;
var last = entries[entries.length-1];
if (last.entry_type===“END”)         return “FINISHED”;
if (last.entry_type===“PAUSE_START”) return “PAUSED”;
return “RUNNING”;
}

function calcElapsed() {
if (elIv) { clearInterval(elIv); elIv=null; }
var worked=0, t0=null;
entries.forEach(function(e) {
if (e.entry_type===“START”||e.entry_type===“PAUSE_END”)   t0=new Date(e.entry_datetime).getTime();
if ((e.entry_type===“PAUSE_START”||e.entry_type===“END”)&&t0) { worked+=new Date(e.entry_datetime).getTime()-t0; t0=null; }
});
var last = entries[entries.length-1];
if (t0 && last && last.entry_type!==“END”) {
var base=t0;
elIv = setInterval(function(){ subEl.textContent=“Treballat: “+fmtS(Math.floor((worked+Date.now()-base)/1000)); }, 1000);
} else {
elapsed = Math.floor(worked/1000);
subEl.textContent = elapsed>0 ? “Treballat: “+fmtS(elapsed) : new Date().toLocaleDateString(“ca-ES”,{weekday:“long”,day:“numeric”,month:“long”});
}
}

function renderBtns() {
brow.innerHTML = “”;
var st = state();
var colors = {NOT_STARTED:”#475569”,RUNNING:”#22C55E”,PAUSED:”#F59E0B”,FINISHED:”#3B82F6”};
var labels = {NOT_STARTED:“Jornada no iniciada”,RUNNING:“Jornada en curs”,PAUSED:“En pausa”,FINISHED:“Jornada finalitzada”};
stTag.innerHTML=””; add(stTag, tag2(labels[st], colors[st]));
if (st===“NOT_STARTED”) {
var b=el(“button”,“btnG”); b.textContent=“Iniciar jornada”; b.onclick=function(){act(“START”);}; add(brow,b);
}
if (st===“RUNNING”) {
var bp=el(“button”,“btnY”); bp.textContent=“Pausa”;      bp.onclick=function(){act(“PAUSE_START”);};
var bf=el(“button”,“btnR”); bf.textContent=“Finalitzar”; bf.onclick=function(){act(“END”);};
add(brow,bp,bf);
}
if (st===“PAUSED”) {
var br=el(“button”,“btnG”); br.textContent=“Reprendre”;  br.onclick=function(){act(“PAUSE_END”);};
var bf2=el(“button”,“btnR”);bf2.textContent=“Finalitzar”;bf2.onclick=function(){act(“END”);};
add(brow,br,bf2);
}
if (st===“FINISHED”) {
var t=tag2(“Jornada completada”,”#22C55E”);
t.style.cssText=“padding:12px 24px;width:100%;text-align:center;display:block”;
add(brow,t);
}
}

function renderEntries() {
eList.innerHTML=””;
entries.forEach(function(e,i) {
var row=el(“div”,“erow”); row.style.borderBottom=i<entries.length-1?“1px solid #252B3A”:“none”;
var lbl=el(“span”); lbl.textContent=EL[e.entry_type]||e.entry_type;
var t=el(“span”,””,“color:#94A3B8”);
t.textContent=new Date(e.entry_datetime).toLocaleTimeString(“ca-ES”,{hour:“2-digit”,minute:“2-digit”,second:“2-digit”});
add(row,lbl,t); eList.appendChild(row);
});
ec.style.display=entries.length?””:“none”;
}

function renderStats() {
sr.innerHTML=””;
if (!summary) { sr.style.display=“none”; return; }
sr.style.display=“flex”;
var bal=summary.balance_minutes||0;
[[fmtP(summary.theoretical_minutes||w.daily_theoretical_minutes||480),“Teoriques”,”#22C55E”],
[fmtP(summary.worked_minutes||0),“Treballat”,”#3B82F6”],
[fmt(bal),“Saldo”,bal>=0?”#22C55E”:”#EF4444”]
].forEach(function(d) {
var s=el(“div”,“stat”); var sv=el(“div”,“sv”); sv.style.color=d[2]; sv.textContent=d[0];
var sl2=el(“div”,“sl”); sl2.textContent=d[1]; add(s,sv,sl2); add(sr,s);
});
}

function act(type) {
if (busy) return; busy=true;
brow.innerHTML=”<div style='color:#94A3B8;padding:8px;text-align:center'>Guardant…</div>”;
var pn=0; entries.forEach(function(e){ if(e.entry_type===“PAUSE_START”) pn++; });
var pnum = type===“PAUSE_START” ? pn+1 : type===“PAUSE_END” ? pn : null;
dbPost(“time_entries”,{
worker_id:w.id, entry_date:today(), entry_datetime:new Date().toISOString(),
entry_type:type, pause_number:pnum, source_method:“CODE”, is_active:true, created_by_worker_id:w.id
}).then(function(){ return load(); })
.catch(function(e){ errD.innerHTML=””; add(errD,errEl(e.message)); renderBtns(); })
.then(function(){ busy=false; });
}

function load() {
var td=today();
return Promise.all([
dbGet(“daily_records”,“worker_id=eq.”+w.id+”&work_date=eq.”+td+”&select=*”),
dbGet(“time_entries”,“worker_id=eq.”+w.id+”&entry_date=eq.”+td+”&is_active=eq.true&select=*&order=entry_datetime.asc”)
]).then(function(res) {
summary=res[0]&&res[0][0]||null;
entries=res[1]||[];
ldEl.style.display=“none”;
renderBtns(); renderEntries(); renderStats(); calcElapsed();
}).catch(function(e) {
ldEl.style.display=“none”; add(errD,errEl(e.message)); renderBtns();
});
}

load();
return page;
}

// ════════════════════════════════════════════════════════════════════════════
// MONTH HISTORY
// ════════════════════════════════════════════════════════════════════════════
function pgMonthHistory() {
var w=ST.worker;
var page=el(“div”,“page”);
var mnEl=el(“span”,””,“font-size:12px;color:#94A3B8”);
mnEl.textContent=new Date().toLocaleDateString(“ca-ES”,{month:“long”,year:“numeric”});
add(page,topBar(“Historial”,function(){go({screen:“workerHome”});},mnEl));
var body=el(“div”,“body”); var ldEl=spin(); add(body,ldEl);
add(page,body,wNav(“hi”));

var td=new Date(), from=td.getFullYear()+”-”+pad(td.getMonth()+1)+”-01”;
dbGet(“daily_records”,“worker_id=eq.”+w.id+”&work_date=gte.”+from+”&select=*&order=work_date.desc”)
.then(function(recs) {
ldEl.remove();
var records=recs||[], total=0, bal=0, inc=0;

if(!items.length){ var emp=el(“div”,””,“color:#94A3B8;text-align:center”); emp.textContent=“Sense permisos”; add(ld,emp); return; }
items.forEach(function(it){
var t=types[it.day_type];
var card=el(“div”,“card”); var row=el(“div”,“row”);
var left=el(“div”);
var wn=el(“div”,””,“font-weight:600;margin-bottom:2px”); wn.textContent=wMap[it.worker_id]||String(it.worker_id);
var dl=el(“div”,””,“font-size:12px;color:#94A3B8;margin-bottom:4px”);
dl.textContent=it.start_date+(it.end_date!==it.start_date?” a “+it.end_date:””);
add(left,wn,dl,badge(t?t.lb:it.day_type,t?t.c:”#94A3B8”));
var isZero=it.compute_mode===“ZERO_HOURS”;
var sw=el(“div”,””,“text-align:right;cursor:pointer”);
var swLbl=el(“div”,””,“font-size:12px;font-weight:600;color:”+(isZero?”#EF4444”:”#22C55E”)+”;margin-bottom:4px”);
swLbl.textContent=isZero?“0 hores”:“Teorica”;
var track=el(“div”,””,“width:34px;height:19px;border-radius:10px;background:”+(isZero?”#EF4444”:”#22C55E”)+”;position:relative;display:inline-block”);
var thumb=el(“div”,””,“width:15px;height:15px;border-radius:8px;background:#fff;position:absolute;top:2px;left:”+(isZero?“2px”:“17px”));
add(track,thumb); add(sw,swLbl,track);
sw.onclick=function(){
var nm=it.compute_mode===“ZERO_HOURS”?“THEORETICAL_HOURS”:“ZERO_HOURS”;
dbPatch(“day_status”,“id=eq.”+it.id,{compute_mode:nm}).then(function(){it.compute_mode=nm;renderList();}).catch(function(){});
};
add(row,left,sw); add(card,row); add(ld,card);
});
}
return page;
}

// ALL BALANCES
// ════════════════════════════════════════════════════════════════════════════
function pgAllBalances() {
var page=el(“div”,“page”);
add(page,topBar(“Saldos globals”,function(){go({screen:“adminHome”});}));
var body=el(“div”,“body”); var ldEl=spin(); add(body,ldEl);
add(page,body,aNav(“ah”));
var td=new Date(), from=td.getFullYear()+”-”+pad(td.getMonth()+1)+”-01”;
Promise.all([
dbGet(“workers”,“is_active=eq.true&select=id,display_name,daily_theoretical_minutes”),
dbGet(“daily_records”,“work_date=gte.”+from+”&select=worker_id,worked_minutes,balance_minutes”)
]).then(function(res){
ldEl.remove();
var byW={};
(res[1]||[]).forEach(function(r){ if(!byW[r.worker_id])byW[r.worker_id]={worked:0,balance:0}; byW[r.worker_id].worked+=r.worked_minutes||0; byW[r.worker_id].balance+=r.balance_minutes||0; });
(res[0]||[]).forEach(function(w){
var d=byW[w.id]||{worked:0,balance:0};
var c=el(“div”,“csm”); c.style.cursor=“default”;
var info=el(“div”,””,“flex:1”);
var l1=el(“div”,””,“font-weight:600”); l1.textContent=w.display_name;
var l2=el(“div”,””,“font-size:11px;color:#94A3B8”); l2.textContent=fmtP(d.worked)+” treballades”;
add(info,l1,l2);
var right=el(“div”,””,“text-align:right”);
var bv=el(“div”,””,“font-size:18px;font-weight:700;color:”+(d.balance>=0?”#22C55E”:”#EF4444”)); bv.textContent=fmt(d.balance);
var bl=el(“div”,””,“font-size:10px;color:#94A3B8”); bl.textContent=“saldo mensual”;
add(right,bv,bl); add(c,av(w.display_name,42),info,right); add(body,c);
});
}).catch(function(e){ ldEl.remove(); add(body,errEl(e.message)); });
return page;
}

// SETTINGS
// ════════════════════════════════════════════════════════════════════════════
function pgSettings() {
var page=el(“div”,“page”);
add(page,topBar(“Configuracio”,function(){go({screen:“adminHome”});}));
var body=el(“div”,“body”); var ldEl=spin(); add(body,ldEl);
add(page,body,aNav(“st”));
var settings=[];
dbGet(“app_settings”,“select=*”).then(function(s){
ldEl.remove(); settings=s||[];
if(!settings.length){ add(body,infEl(“La taula app_settings es buida.”)); return; }
var card=el(“div”,“card”); var ct=el(“div”,“h3”); ct.textContent=“Parametres globals”; add(card,ct);
settings.forEach(function(s,i){
var row=el(“div”,“srow”); row.style.borderBottom=i<settings.length-1?“1px solid #252B3A”:“none”;
var kk=el(“div”,””,“font-size:12px;font-family:monospace;color:#94A3B8”); kk.textContent=s.setting_key;
var vi=el(“input”,“inp”,“width:140px;text-align:right”); vi.value=s.setting_value||””;
vi.oninput=function(e){s.setting_value=e.target.value;};
add(row,kk,vi); add(card,row);
});
add(body,card);
var sb=el(“button”,“btnP”); sb.textContent=“Guardar configuracio”;
sb.onclick=function(){
sb.textContent=“Guardant…”; sb.disabled=true;
var chain=Promise.resolve();
settings.forEach(function(s){ chain=chain.then(function(){ return dbPatch(“app_settings”,“setting_key=eq.”+s.setting_key,{setting_value:s.setting_value}).catch(function(){}); }); });
chain.then(function(){ sb.textContent=“Guardat!”; setTimeout(function(){sb.textContent=“Guardar configuracio”;sb.disabled=false;},2000); });
};
add(body,sb);
}).catch(function(e){ ldEl.remove(); add(body,errEl(e.message)); });
return page;
}

}

window.onerror = function(msg,src,line,col,err) {
document.getElementById(“app”).innerHTML =
“<div style='padding:20px;color:#EF4444;font-size:14px'>” +
“<strong>Error JS:</strong><br>” + msg + “<br>Linia: “ + line + “<br>” + String(err) +
“</div>”;
return false;
};
