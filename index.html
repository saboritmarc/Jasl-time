function dbGet(table, query) {
var url = SB + “/rest/v1/” + table + “?” + query;
return fetch(url, {
headers: { “apikey”: KEY, “Authorization”: “Bearer “ + KEY }
}).then(function(r) {
return r.text().then(function(t) {
if (!r.ok) throw new Error(“HTTP “ + r.status + “: “ + t);
return t ? JSON.parse(t) : [];
});
});
}

function dbPost(table, body) {
return fetch(SB + “/rest/v1/” + table, {
method: “POST”,
headers: { “apikey”: KEY, “Authorization”: “Bearer “ + KEY, “Content-Type”: “application/json”, “Prefer”: “return=representation” },
body: JSON.stringify(body)
}).then(function(r) {
return r.text().then(function(t) {
if (!r.ok) throw new Error(“HTTP “ + r.status + “: “ + t);
return t ? JSON.parse(t) : null;
});
});
}

function dbPatch(table, query, body) {
return fetch(SB + “/rest/v1/” + table + “?” + query, {
method: “PATCH”,
headers: { “apikey”: KEY, “Authorization”: “Bearer “ + KEY, “Content-Type”: “application/json”, “Prefer”: “return=representation” },
body: JSON.stringify(body)
}).then(function(r) {
return r.text().then(function(t) {
if (!r.ok) throw new Error(“HTTP “ + r.status + “: “ + t);
return t ? JSON.parse(t) : null;
});
});
}

function pad(n) { return String(n).padStart(2, “0”); }
function fmt(m) { var s = m < 0 ? “-” : “+”, a = Math.abs(m); return s + pad(Math.floor(a/60)) + “h” + pad(a%60) + “m”; }
function fmtP(m) { return pad(Math.floor(m/60)) + “h” + pad(m%60) + “m”; }
function fmtS(s) { return pad(Math.floor(s/3600)) + “:” + pad(Math.floor((s%3600)/60)) + “:” + pad(s%60); }
function nowTime() { var n = new Date(); return pad(n.getHours()) + “:” + pad(n.getMinutes()); }
function todayStr() { var d = new Date(); return d.getFullYear() + “-” + pad(d.getMonth()+1) + “-” + pad(d.getDate()); }
function dateLabel(d) { return new Date(d + “T12:00:00”).toLocaleDateString(“ca-ES”, {weekday:“short”, day:“numeric”, month:“short”}); }
function statusColor(s) { return ({CLOSED:”#22C55E”,VACATION:”#A855F7”,SICK:”#F59E0B”,WEEKEND:”#475569”,OPEN:”#3B82F6”,NOT_STARTED:”#475569”})[s] || “#94A3B8”; }
function statusLabel(s) { return ({CLOSED:“Tancat”,VACATION:“Vacances”,SICK:“Baixa”,WEEKEND:“Cap de setmana”,OPEN:“En curs”,NOT_STARTED:“Pendent”})[s] || s; }
var ENTRY_LABELS = {START:“Inici”, END:“Final”, PAUSE_START:“Pausa”, PAUSE_END:“Represa”};

function mk(tag, className, cssText) {
var e = document.createElement(tag);
if (className) e.className = className;
if (cssText) e.style.cssText = cssText;
return e;
}
function ap() {
var parent = arguments[0];
for (var i = 1; i < arguments.length; i++) {
var child = arguments[i];
if (child == null) continue;
if (typeof child === “string”) { parent.appendChild(document.createTextNode(child)); }
else { parent.appendChild(child); }
}
return parent;
}

}

}

[{sc:“workerHome”,id:“h”,lb:“Avui”},{sc:“monthHistory”,id:“hi”,lb:“Historial”},{sc:“permissions”,id:“p”,lb:“Permisos”},{sc:“balance”,id:“b”,lb:“Saldo”},{sc:“profile”,id:“pr”,lb:“Perfil”}].forEach(function(item) {

function mkANav(active) {

[{sc:“adminHome”,id:“ah”,lb:“Inici”},{sc:“workers”,id:“wk”,lb:“Equip”},{sc:“records”,id:“rc”,lb:“Registres”},{sc:“exports”,id:“ex”,lb:“Exports”},{sc:“settings”,id:“st”,lb:“Config.”}].forEach(function(item) {

ap(nav, btn);
});
return nav;
}

var APP = {screen:“splash”, worker:null, selDay:null};

function goTo(updates) {
if (tickIv)    { clearInterval(tickIv);    tickIv = null; }
if (elapsedIv) { clearInterval(elapsedIv); elapsedIv = null; }
for (var k in updates) APP[k] = updates[k];
renderApp();
}

function screenWorkerHome() {
var w = APP.worker;
var page = mk(“div”,“page”);
var top = mk(“div”,“top”);
var wi = mk(“div”,””,“display:flex;align-items:center;gap:10px”);
var wname = mk(“div”,””,“font-size:13px;font-weight:600”); wname.textContent = w.display_name;
var wcode = mk(“div”,””,“font-size:11px;color:#94A3B8”); wcode.textContent = “#” + w.employee_code;

var outBtn = mk(“button”,“btnGh”); outBtn.textContent = “Sortir”; outBtn.onclick = function() { goTo({screen:“splash”,worker:null}); };
ap(top, wi, outBtn); ap(page, top);
var body = mk(“div”,“body”); var errD = mk(“div”); ap(body, errD);
var cc = mk(“div”,“card”,“text-align:center”);
var stTag = mk(“div”,””,“margin-bottom:10px”);
var clkEl = mk(“div”,“clk”); clkEl.textContent = nowTime();
var subEl = mk(“div”,””,“font-size:13px;color:#94A3B8;margin-bottom:14px”);
subEl.textContent = new Date().toLocaleDateString(“ca-ES”,{weekday:“long”,day:“numeric”,month:“long”});
var brow = mk(“div”,“brow”);
var ldEl = mk(“div”,“ld”); ldEl.textContent = “Carregant…”;
ap(cc, stTag, clkEl, subEl, ldEl, brow); ap(body, cc);
var ec = mk(“div”,“card”,“display:none”);
var eH = mk(“div”,””,“display:flex;justify-content:space-between;margin-bottom:8px”);
var eTtl = mk(“div”,“h3”); eTtl.textContent = “Fitxades d’avui”;
var eRef = mk(“button”,“btnGh”,“font-size:11px;padding:3px 8px”); eRef.textContent = “Actualitzar”; eRef.onclick = loadData;
var eList = mk(“div”); ap(eH, eTtl, eRef); ap(ec, eH, eList); ap(body, ec);
var sr = mk(“div”,“stats”,“display:none”); ap(body, sr);
ap(page, body, mkWNav(“h”));
tickIv = setInterval(function() { clkEl.textContent = nowTime(); }, 1000);
var entries = [], summary = null, busy = false;

function getClockState() {
if (!entries.length) return “NOT_STARTED”;
var last = entries[entries.length-1];
if (last.entry_type === “END”) return “FINISHED”;
if (last.entry_type === “PAUSE_START”) return “PAUSED”;
return “RUNNING”;
}
function updateElapsed() {
if (elapsedIv) { clearInterval(elapsedIv); elapsedIv = null; }
var worked = 0, t0 = null;
entries.forEach(function(e) {
if (e.entry_type===“START” || e.entry_type===“PAUSE_END”) t0 = new Date(e.entry_datetime).getTime();
if ((e.entry_type===“PAUSE_START” || e.entry_type===“END”) && t0) { worked += new Date(e.entry_datetime).getTime() - t0; t0 = null; }
});
var last = entries.length ? entries[entries.length-1] : null;
if (t0 && last && last.entry_type !== “END”) {
var base = t0;
elapsedIv = setInterval(function() { subEl.textContent = “Treballat: “ + fmtS(Math.floor((worked+Date.now()-base)/1000)); }, 1000);
} else {
var secs = Math.floor(worked/1000);
subEl.textContent = secs > 0 ? “Treballat: “ + fmtS(secs) : new Date().toLocaleDateString(“ca-ES”,{weekday:“long”,day:“numeric”,month:“long”});
}
}
function renderButtons() {
brow.innerHTML = “”;
var st = getClockState();
var colors = {NOT_STARTED:”#475569”,RUNNING:”#22C55E”,PAUSED:”#F59E0B”,FINISHED:”#3B82F6”};
var labels = {NOT_STARTED:“Jornada no iniciada”,RUNNING:“Jornada en curs”,PAUSED:“En pausa”,FINISHED:“Jornada finalitzada”};
stTag.innerHTML = “”; ap(stTag, mkTag(labels[st], colors[st]));
if (st===“NOT_STARTED”) { var b=mk(“button”,“btnG”); b.textContent=“Iniciar jornada”; b.onclick=function(){doAction(“START”);}; ap(brow,b); }
if (st===“RUNNING”) {
var bp=mk(“button”,“btnY”); bp.textContent=“Pausa”; bp.onclick=function(){doAction(“PAUSE_START”);};
var bf=mk(“button”,“btnR”); bf.textContent=“Finalitzar”; bf.onclick=function(){doAction(“END”);};
ap(brow,bp,bf);
}
if (st===“PAUSED”) {
var br=mk(“button”,“btnG”); br.textContent=“Reprendre”; br.onclick=function(){doAction(“PAUSE_END”);};
var bf2=mk(“button”,“btnR”); bf2.textContent=“Finalitzar”; bf2.onclick=function(){doAction(“END”);};
ap(brow,br,bf2);
}
if (st===“FINISHED”) { var t=mkTag(“Jornada completada”,”#22C55E”); t.style.cssText=“padding:12px 24px;width:100%;text-align:center;display:block”; ap(brow,t); }
}
function renderEntries() {
eList.innerHTML = “”;
entries.forEach(function(e,i) {
var row=mk(“div”,“erow”); row.style.borderBottom=i<entries.length-1?“1px solid #252B3A”:“none”;
var lbl=mk(“span”); lbl.textContent=ENTRY_LABELS[e.entry_type]||e.entry_type;
var t=mk(“span”,””,“color:#94A3B8”); t.textContent=new Date(e.entry_datetime).toLocaleTimeString(“ca-ES”,{hour:“2-digit”,minute:“2-digit”,second:“2-digit”});
ap(row,lbl,t); eList.appendChild(row);
});
ec.style.display = entries.length ? “” : “none”;
}
function renderStats() {
sr.innerHTML = “”; if (!summary) { sr.style.display=“none”; return; } sr.style.display=“flex”;
var bal = summary.balance_minutes||0;
[[fmtP(summary.theoretical_minutes||w.daily_theoretical_minutes||480),“Teoriques”,”#22C55E”],[fmtP(summary.worked_minutes||0),“Treballat”,”#3B82F6”],[fmt(bal),“Saldo”,bal>=0?”#22C55E”:”#EF4444”]].forEach(function(d) {
var s=mk(“div”,“stat”); var sv=mk(“div”,“sv”); sv.style.color=d[2]; sv.textContent=d[0]; var sl=mk(“div”,“sl”); sl.textContent=d[1]; ap(s,sv,sl); ap(sr,s);
});
}
function doAction(type) {
if (busy) return; busy = true;
brow.innerHTML = “<div style='color:#94A3B8;padding:8px;text-align:center'>Guardant…</div>”;
var pn = 0; entries.forEach(function(e) { if (e.entry_type===“PAUSE_START”) pn++; });
var pnum = type===“PAUSE_START” ? pn+1 : type===“PAUSE_END” ? pn : null;
dbPost(“time_entries”, {worker_id:w.id,entry_date:todayStr(),entry_datetime:new Date().toISOString(),entry_type:type,pause_number:pnum,source_method:“CODE”,is_active:true,created_by_worker_id:w.id})
.then(function() { return loadData(); })
.catch(function(e) { errD.innerHTML=””; ap(errD,mkErr(e.message)); renderButtons(); })
.then(function() { busy = false; });
}
function loadData() {
var td = todayStr();
return Promise.all([
dbGet(“daily_records”,“worker_id=eq.”+w.id+”&work_date=eq.”+td+”&select=*”),
dbGet(“time_entries”,“worker_id=eq.”+w.id+”&entry_date=eq.”+td+”&is_active=eq.true&select=*&order=entry_datetime.asc”)
]).then(function(res) {
summary = res[0]&&res[0][0] ? res[0][0] : null; entries = res[1]||[];
ldEl.style.display=“none”; renderButtons(); renderEntries(); renderStats(); updateElapsed();
}).catch(function(e) { ldEl.style.display=“none”; ap(errD,mkErr(e.message)); renderButtons(); });
}
loadData();
return page;
}

[[fmtP(total),“Treballat”,”#F1F5F9”],[fmt(bal),“Saldo”,bal>=0?”#22C55E”:”#EF4444”],[String(inc),“Incid.”,inc>0?”#F59E0B”:”#22C55E”]].forEach(function(d){

(res[1]||[]).forEach(function(r){if(!byW[r.worker_id])byW[r.worker_id]={worked:0,balance:0};byW[r.worker_id].worked+=r.worked_minutes||0;byW[r.worker_id].balance+=r.balance_minutes||0;});
(res[0]||[]).forEach(function(w){
var d=byW[w.id]||{worked:0,balance:0};var c=mk(“div”,“csm”);c.style.cursor=“default”;var info=mk(“div”,””,“flex:1”);
var l1=mk(“div”,””,“font-weight:600”);l1.textContent=w.display_name;var l2=mk(“div”,””,“font-size:11px;color:#94A3B8”);l2.textContent=fmtP(d.worked)+” treballades”;ap(info,l1,l2);
var right=mk(“div”,””,“text-align:right”);var bv=mk(“div”,””,“font-size:18px;font-weight:700;color:”+(d.balance>=0?”#22C55E”:”#EF4444”));bv.textContent=fmt(d.balance);var bl=mk(“div”,””,“font-size:10px;color:#94A3B8”);bl.textContent=“saldo mensual”;
ap(right,bv,bl);ap(c,mkAv(w.display_name,42),info,right);ap(body,c);
});
}).catch(function(e){ldEl.remove();ap(body,mkErr(e.message));});
return page;
}

function screenSettings() {
var page=mk(“div”,“page”);ap(page,mkTopBar(“Configuracio”,function(){goTo({screen:“adminHome”});}));
var body=mk(“div”,“body”);var ldEl=mkSpin();ap(body,ldEl);ap(page,body,mkANav(“st”));
var settings=[];
dbGet(“app_settings”,“select=*”).then(function(s){
ldEl.remove();settings=s||[];if(!settings.length){ap(body,mkInf(“La taula app_settings es buida.”));return;}
var card=mk(“div”,“card”);var ct=mk(“div”,“h3”);ct.textContent=“Parametres globals”;ap(card,ct);
settings.forEach(function(s,i){
var row=mk(“div”,“srow”);row.style.borderBottom=i<settings.length-1?“1px solid #252B3A”:“none”;
var kk=mk(“div”,””,“font-size:12px;font-family:monospace;color:#94A3B8”);kk.textContent=s.setting_key;
var vi=mk(“input”,“inp”,“width:140px;text-align:right”);vi.value=s.setting_value||””;vi.oninput=function(e){s.setting_value=e.target.value;};
ap(row,kk,vi);ap(card,row);
});
ap(body,card);
var sb=mk(“button”,“btnP”);sb.textContent=“Guardar configuracio”;
sb.onclick=function(){
sb.textContent=“Guardant…”;sb.disabled=true;var chain=Promise.resolve();
settings.forEach(function(s){chain=chain.then(function(){return dbPatch(“app_settings”,“setting_key=eq.”+s.setting_key,{setting_value:s.setting_value}).catch(function(){});});});
chain.then(function(){sb.textContent=“Guardat!”;setTimeout(function(){sb.textContent=“Guardar configuracio”;sb.disabled=false;},2000);});
};
ap(body,sb);
}).catch(function(e){ldEl.remove();ap(body,mkErr(e.message));});
return page;
}

};
