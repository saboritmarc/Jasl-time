<!DOCTYPE html>

<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JASL Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0F14;color:#F1F5F9;font-family:-apple-system,sans-serif;padding:20px;font-size:15px}
.ok{color:#22C55E;margin:6px 0}
.er{color:#EF4444;margin:6px 0}
.in{color:#94A3B8;margin:4px 0;font-size:13px}
.btn{background:#3B82F6;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.inp{background:#1C2130;border:1px solid #252B3A;border-radius:10px;padding:12px;color:#F1F5F9;font-size:20px;width:100%;outline:none;text-align:center;letter-spacing:8px;margin-top:8px}
.btnY{background:#F59E0B;color:#000;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.btnR{background:#EF4444;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.btnG{background:#22C55E;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
h2{font-size:17px;font-weight:700;margin:16px 0 8px}
hr{border:none;border-top:1px solid #252B3A;margin:16px 0}
.erow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #252B3A;font-size:13px}
</style>
</head>
<body>
<div style="text-align:center;margin-bottom:20px">
  <div style="font-size:44px">⏱</div>
  <div style="font-size:22px;font-weight:800">JASL<span style="color:#3B82F6">Time</span></div>
</div>

<h2>Diagnòstic</h2>
<div id="log"></div>

<hr>
<div id="loginBox" style="display:none">
  <h2>Entrar</h2>
  <input class="inp" id="codeInp" type="password" placeholder="Codi" maxlength="20">
  <button class="btn" id="loginBtn">Entrar</button>
  <div id="loginErr"></div>
</div>

<div id="workerBox" style="display:none">
  <h2 id="workerName"></h2>
  <div id="stateLabel" style="color:#94A3B8;margin-bottom:10px"></div>
  <div id="actionBtns"></div>
  <div id="entriesList" style="margin-top:16px"></div>
</div>

<script>
const SB = "https://fywkafpfcnqynvjdedfj.supabase.co";
const KEY = "sb_publishable_9w912fn8EaE-84SAAV-Rww_xHKPipSv";

function log(msg, cls="in") {
  const d = document.createElement("div");
  d.className = cls;
  d.textContent = msg;
  document.getElementById("log").appendChild(d);
}

function today() {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

async function api(method, table, query, body) {
  const url = SB+"/rest/v1/"+table+(query?"?"+query:"");
  const opts = {
    method: method||"GET",
    headers: {
      "apikey": KEY,
      "Authorization": "Bearer "+KEY,
      "Content-Type": "application/json",
      "Prefer": "return=representation"
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  const t = await r.text();
  if(!r.ok) throw new Error("HTTP "+r.status+": "+t);
  return t ? JSON.parse(t) : null;
}

// DIAGNÒSTIC
async function diag() {
  log("Provant connexió…");
  try {
    const r = await fetch(SB+"/rest/v1/workers?select=id&limit=1", {
      headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}
    });
    if(r.ok) {
      log("✅ Connexió OK", "ok");
    } else {
      log("❌ HTTP "+r.status, "er");
      return;
    }
  } catch(e) {
    log("❌ Error xarxa: "+e.message, "er");
    log("Comprova que tens connexió a internet", "in");
    return;
  }

  log("Provant taula workers…");
  try {
    const ws = await api("GET","workers","select=id,display_name,employee_code&limit=5");
    log("✅ Workers OK ("+ws.length+" registres)", "ok");
  } catch(e) {
    log("❌ "+e.message, "er");
    return;
  }

  log("✅ Tot correcte — pots entrar!", "ok");
  document.getElementById("loginBox").style.display = "block";
}

// LOGIN
let W = null, entries = [];

document.getElementById("loginBtn").onclick = async function() {
  const code = document.getElementById("codeInp").value.trim();
  if(!code) return;
  this.textContent = "Verificant…"; this.disabled = true;
  document.getElementById("loginErr").innerHTML = "";
  try {
    const ws = await api("GET","workers","employee_code=eq."+code+"&is_active=eq.true&select=*");
    if(ws && ws.length) {
      W = ws[0];
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("workerBox").style.display = "block";
      document.getElementById("workerName").textContent = "👋 "+W.display_name;
      await loadEntries();
    } else {
      document.getElementById("loginErr").innerHTML = '<div class="er">❌ Codi no trobat</div>';
      this.textContent = "Entrar"; this.disabled = false;
    }
  } catch(e) {
    document.getElementById("loginErr").innerHTML = '<div class="er">❌ '+e.message+'</div>';
    this.textContent = "Entrar"; this.disabled = false;
  }
};

// FITXATGE
async function loadEntries() {
  try {
    entries = await api("GET","time_entries","worker_id=eq."+W.id+"&entry_date=eq."+today()+"&is_active=eq.true&select=*&order=entry_datetime.asc") || [];
    render();
  } catch(e) {
    document.getElementById("stateLabel").textContent = "Error: "+e.message;
  }
}

function getState() {
  if(!entries.length) return "NOT_STARTED";
  const last = entries[entries.length-1];
  if(last.entry_type==="END") return "FINISHED";
  if(last.entry_type==="PAUSE_START") return "PAUSED";
  return "RUNNING";
}

function render() {
  const st = getState();
  const stLabels = {NOT_STARTED:"Jornada no iniciada",RUNNING:"🟢 En curs",PAUSED:"🟡 En pausa",FINISHED:"✅ Finalitzada"};
  document.getElementById("stateLabel").textContent = stLabels[st];

  const btns = document.getElementById("actionBtns");
  btns.innerHTML = "";

  if(st==="NOT_STARTED") {
    const b = document.createElement("button");
    b.className="btnG"; b.textContent="▶ Iniciar jornada";
    b.onclick = ()=>doAction("START"); btns.appendChild(b);
  }
  if(st==="RUNNING") {
    const bp = document.createElement("button");
    bp.className="btnY"; bp.textContent="⏸ Pausa";
    bp.onclick = ()=>doAction("PAUSE_START"); btns.appendChild(bp);
    const bf = document.createElement("button");
    bf.className="btnR"; bf.textContent="⏹ Finalitzar";
    bf.onclick = ()=>doAction("END"); btns.appendChild(bf);
  }
  if(st==="PAUSED") {
    const br = document.createElement("button");
    br.className="btnG"; br.textContent="▶ Reprendre";
    br.onclick = ()=>doAction("PAUSE_END"); btns.appendChild(br);
    const bf = document.createElement("button");
    bf.className="btnR"; bf.textContent="⏹ Finalitzar";
    bf.onclick = ()=>doAction("END"); btns.appendChild(bf);
  }

  const eL = {"START":"▶️ Inici","END":"⏹️ Final","PAUSE_START":"⏸️ Pausa","PAUSE_END":"▶️ Represa"};
  const el = document.getElementById("entriesList");
  el.innerHTML = entries.map(e =>
    '<div class="erow"><span>'+(eL[e.entry_type]||e.entry_type)+'</span><span style="color:#94A3B8">'+
    new Date(e.entry_datetime).toLocaleTimeString("ca-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"})+'</span></div>'
  ).join("");
}

async function doAction(type) {
  const btns = document.getElementById("actionBtns");
  btns.innerHTML = '<div style="color:#94A3B8;padding:10px;text-align:center">Guardant…</div>';
  try {
    const pn = entries.filter(e=>e.entry_type==="PAUSE_START").length;
    await api("POST","time_entries",null,{
      worker_id: W.id,
      entry_date: today(),
      entry_datetime: new Date().toISOString(),
      entry_type: type,
      pause_number: type==="PAUSE_START" ? pn+1 : null,
      source_method: "CODE",
      is_active: true
    });
    await loadEntries();
  } catch(e) {
    btns.innerHTML = '<div class="er">❌ '+e.message+'</div>';
    setTimeout(()=>render(), 3000);
  }
}

diag();
</script>

</body>
</html>
