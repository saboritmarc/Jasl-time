const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = “https://fywkafpfcnqynvjdedfj.supabase.co”;
const SUPABASE_KEY = “sb_publishable_9w912fn8EaE-84SAAV-Rww_xHKPipSv”;

const sb = async (path, options = {}) => {
const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
headers: {
“apikey”: SUPABASE_KEY,
“Authorization”: `Bearer ${SUPABASE_KEY}`,
“Content-Type”: “application/json”,
“Prefer”: options.prefer || “return=representation”,
…options.headers,
},
method: options.method || “GET”,
body: options.body ? JSON.stringify(options.body) : undefined,
});
if (!res.ok) {
const err = await res.text();
throw new Error(`Error ${res.status}: ${err}`);
}
const text = await res.text();
return text ? JSON.parse(text) : null;
};

const sbGet = (table, query = “”) => sb(`${table}?${query}`);
const sbPost = (table, body) => sb(table, { method: “POST”, body });
const sbPatch = (table, query, body) => sb(`${table}?${query}`, { method: “PATCH”, body });

const C = {
bg:”#0D0F14”,surface:”#151820”,card:”#1C2130”,border:”#252B3A”,
accent:”#3B82F6”,green:”#22C55E”,yellow:”#F59E0B”,red:”#EF4444”,
purple:”#A855F7”,text:”#F1F5F9”,textMid:”#94A3B8”,textDim:”#475569”,
};

const fmt = (min) => { const s=min<0?”-”:”+”,a=Math.abs(min); return `${s}${String(Math.floor(a/60)).padStart(2,"0")}h ${String(a%60).padStart(2,"0")}m`; };
const fmtPos = (min) => `${String(Math.floor(min/60)).padStart(2,"0")}h ${String(min%60).padStart(2,"0")}m`;
const fmtSec = (s) => `${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const timeNow = () => { const n=new Date(); return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`; };
const dateLabel = (d) => new Date(d+“T12:00:00”).toLocaleDateString(“ca-ES”,{weekday:“short”,day:“numeric”,month:“short”});
const sColor = (s) => ({CLOSED:C.green,VACATION:C.purple,SICK:C.yellow,WEEKEND:C.textDim,OPEN:C.accent,NOT_STARTED:C.textDim})[s]||C.textDim;
const sLabel = (s) => ({CLOSED:“Tancat”,VACATION:“Vacances”,SICK:“Baixa”,WEEKEND:“Cap de setmana”,OPEN:“En curs”,NOT_STARTED:“Pendent”})[s]||s;
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };

const g = {
app:{fontFamily:”‘Segoe UI’,sans-serif”,background:C.bg,color:C.text,minHeight:“100vh”,display:“flex”,flexDirection:“column”},
top:{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:“0 20px”,height:56,display:“flex”,alignItems:“center”,justifyContent:“space-between”,position:“sticky”,top:0,zIndex:100,flexShrink:0},
body:{flex:1,padding:“20px”,maxWidth:680,margin:“0 auto”,width:“100%”,boxSizing:“border-box”},

btnP:{background:C.accent,color:”#fff”,border:“none”,borderRadius:12,padding:“13px 24px”,fontSize:15,fontWeight:600,cursor:“pointer”,width:“100%”},
btnG:{background:C.green,color:”#fff”,border:“none”,borderRadius:12,padding:“13px 24px”,fontSize:15,fontWeight:600,cursor:“pointer”,flex:1},
btnY:{background:C.yellow,color:”#000”,border:“none”,borderRadius:12,padding:“13px 24px”,fontSize:15,fontWeight:600,cursor:“pointer”,flex:1},
btnR:{background:C.red,color:”#fff”,border:“none”,borderRadius:12,padding:“13px 24px”,fontSize:15,fontWeight:600,cursor:“pointer”,flex:1},
btnGh:{background:“transparent”,color:C.textMid,border:`1px solid ${C.border}`,borderRadius:9,padding:“9px 14px”,fontSize:13,fontWeight:500,cursor:“pointer”},

badge:(c)=>({background:c+“22”,color:c,fontSize:11,fontWeight:600,padding:“2px 8px”,borderRadius:6,display:“inline-block”}),
tag:(c)=>({background:c+“18”,color:c,border:`1px solid ${c}44`,borderRadius:20,padding:“4px 12px”,fontSize:12,fontWeight:600,display:“inline-block”}),
stat:{background:C.surface,borderRadius:12,padding:“12px 14px”,flex:1,textAlign:“center”},

bigClock:{fontSize:48,fontWeight:700,letterSpacing:”-2px”,color:C.text,textAlign:“center”,margin:“6px 0”},
tabs:{display:“flex”,background:C.surface,borderRadius:10,padding:3,marginBottom:16,gap:3},
tab:(a)=>({flex:1,padding:“7px 10px”,borderRadius:8,border:“none”,cursor:“pointer”,fontSize:13,fontWeight:a?600:400,background:a?C.card:“transparent”,color:a?C.text:C.textMid}),
avatar:(sz)=>({width:sz,height:sz,borderRadius:sz/2,background:C.accent+“33”,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:sz*0.38,fontWeight:700,color:C.accent,flexShrink:0}),
err:{background:C.red+“18”,border:`1px solid ${C.red}44`,borderRadius:10,padding:“10px 14px”,fontSize:13,color:C.red,marginBottom:12},
loading:{textAlign:“center”,padding:40,color:C.textMid,fontSize:14},
};

function Av({name,size=40}){
const initials=(name||”?”).split(” “).map(n=>n[0]).slice(0,2).join(””).toUpperCase();
return <div style={g.avatar(size)}>{initials}</div>;
}
function LiveClock(){
const [t,setT]=useState(timeNow());
useEffect(()=>{const i=setInterval(()=>setT(timeNow()),1000);return()=>clearInterval(i);},[]);
return <div style={g.bigClock}>{t}</div>;
}
function Spinner(){return <div style={g.loading}>⏳ Carregant des de Supabase…</div>;}
function ErrBox({msg}){return <div style={g.err}>⚠️ {msg}</div>;}

function WNav({cur,onNav}){
const items=[{id:“home”,lb:“🏠 Avui”},{id:“history”,lb:“📋 Historial”},{id:“permissions”,lb:“🛡 Permisos”},{id:“balance”,lb:“⚖️ Saldo”},{id:“profile”,lb:“👤 Perfil”}];
return <nav style={g.nav}>{items.map(it=><button key={it.id} style={g.navIt(cur===it.id)} onClick={()=>onNav(it.id)}>{it.lb}</button>)}</nav>;
}
function ANav({cur,onNav}){
const items=[{id:“adminHome”,lb:“🏠 Inici”},{id:“workers”,lb:“👥 Equip”},{id:“records”,lb:“📋 Registres”},{id:“exports”,lb:“⬇️ Exports”},{id:“settings”,lb:“⚙️ Config.”}];
return <nav style={g.nav}>{items.map(it=><button key={it.id} style={g.navIt(cur===it.id)} onClick={()=>onNav(it.id)}>{it.lb}</button>)}</nav>;

function LoginCode({onBack,onSuccess}){
const [code,setCode]=useState(””);
const [err,setErr]=useState(””);
const [loading,setLoading]=useState(false);
const go=async()=>{
setLoading(true);setErr(””);
try{
const workers=await sbGet(“workers”,`employee_code=eq.${code}&is_active=eq.true&select=*`);
if(workers&&workers.length>0){onSuccess(workers[0]);}
else{setErr(“Codi incorrecte o treballador inactiu.”);}
}catch(e){setErr(`Error de connexió: ${e.message}`);}
setLoading(false);
};
return (
<div style={g.app}>
<div style={g.top}><button style={g.btnGh} onClick={onBack}>← Tornar</button><div style={{fontWeight:700}}>JASL<span style={{color:C.accent}}>Time</span></div><div style={{width:60}}/></div>
<div style={{…g.body,display:“flex”,flexDirection:“column”,justifyContent:“center”}}>
<div style={{…g.card,textAlign:“center”}}>
<div style={{fontSize:36,marginBottom:8}}>🔐</div>
<div style={g.h1}>Identificació</div>
<div style={{color:C.textMid,fontSize:13,marginBottom:20}}>Introdueix el teu codi personal</div>
<input style={{…g.input,fontSize:22,textAlign:“center”,letterSpacing:8,marginBottom:14}} type=“password” value={code} onChange={e=>setCode(e.target.value)} placeholder=”••••” maxLength={10} onKeyDown={e=>e.key===“Enter”&&go()}/>
{err&&<ErrBox msg={err}/>}
<button style={{...g.btnP,opacity:(!code||loading)?0.5:1}} onClick={go} disabled={!code||loading}>{loading?“Verificant…”:“Entrar”}</button>
</div>
</div>
</div>
);
}

function WorkerHome({worker,onLogout,onNav}){
const [entries,setEntries]=useState([]);
const [summary,setSummary]=useState(null);
const [loading,setLoading]=useState(true);
const [actLoading,setActLoading]=useState(false);
const [elapsed,setElapsed]=useState(0);
const [err,setErr]=useState(””);

const load=useCallback(async()=>{
try{
const today=todayStr();
const [recs,ents]=await Promise.all([
sbGet(“daily_records”,`worker_id=eq.${worker.id}&work_date=eq.${today}&select=*`),
sbGet(“time_entries”,`worker_id=eq.${worker.id}&entry_date=eq.${today}&is_active=eq.true&select=*&order=entry_datetime.asc`),
]);
setSummary(recs?.[0]||null);
setEntries(ents||[]);
}catch(e){setErr(e.message);}
setLoading(false);
},[worker.id]);

useEffect(()=>{load();},[load]);

useEffect(()=>{
if(!entries.length)return;
let worked=0,lastStart=null;
for(const e of entries){
if(e.entry_type===“START”||e.entry_type===“END_PAUSE”) lastStart=new Date(e.entry_datetime);
if((e.entry_type===“START_PAUSE”||e.entry_type===“END”)&&lastStart){worked+=(new Date(e.entry_datetime)-lastStart);lastStart=null;}
}
const last=entries[entries.length-1];
if(lastStart&&last?.entry_type!==“END”){
const iv=setInterval(()=>setElapsed(Math.floor((worked+(Date.now()-lastStart))/1000)),1000);
return()=>clearInterval(iv);
}else{setElapsed(Math.floor(worked/1000));}
},[entries]);

const clockAction=async(type)=>{
setActLoading(true);
try{
const pauseNums=entries.filter(e=>e.entry_type===“START_PAUSE”).length;
await sbPost(“time_entries”,{
worker_id:worker.id,entry_date:todayStr(),entry_datetime:new Date().toISOString(),
entry_type:type,pause_number:type===“START_PAUSE”?pauseNums+1:null,source_method:“MANUAL”,is_active:true,
});
await load();
}catch(e){setErr(e.message);}
setActLoading(false);
};

const getState=()=>{
if(!entries.length)return”NOT_STARTED”;
const last=entries[entries.length-1];
if(last.entry_type===“END”)return”FINISHED”;
if(last.entry_type===“START_PAUSE”)return”PAUSED”;
return”RUNNING”;
};
const state=getState();
const stC={NOT_STARTED:C.textDim,RUNNING:C.green,PAUSED:C.yellow,FINISHED:C.accent}[state];
const stL={NOT_STARTED:“Jornada no iniciada”,RUNNING:“Jornada en curs”,PAUSED:“En pausa”,FINISHED:“Jornada finalitzada”}[state];
const eL={START:“▶️ Inici”,END:“⏹️ Final”,START_PAUSE:“⏸️ Pausa”,END_PAUSE:“▶️ Represa”};

return (
<div style={g.app}>
<div style={g.top}>
<div style={{display:“flex”,alignItems:“center”,gap:10}}><Av name={worker.display_name} size={30}/><div><div style={{fontSize:13,fontWeight:600}}>{worker.display_name}</div><div style={{fontSize:11,color:C.textMid}}>#{worker.employee_code}</div></div></div>
<button style={g.btnGh} onClick={onLogout}>Sortir</button>
</div>
<div style={g.body}>
{err&&<ErrBox msg={err}/>}
<div style={{…g.card,textAlign:“center”}}>
<div style={{...g.tag(stC),marginBottom:14}}>{stL}</div>
<LiveClock/>
<div style={{fontSize:13,color:C.textMid,marginBottom:18}}>{elapsed>0?`Treballat: ${fmtSec(elapsed)}`:new Date().toLocaleDateString(“ca-ES”,{weekday:“long”,day:“numeric”,month:“long”})}</div>
{loading?<Spinner/>:(
<div style={g.btnRow}>
{state===“NOT_STARTED”&&<button style={g.btnG} onClick={()=>clockAction(“START”)} disabled={actLoading}>{actLoading?”…”:“▶ Iniciar”}</button>}
{state===“RUNNING”&&<><button style={g.btnY} onClick={()=>clockAction(“START_PAUSE”)} disabled={actLoading}>⏸ Pausa</button><button style={g.btnR} onClick={()=>clockAction(“END”)} disabled={actLoading}>⏹ Finalitzar</button></>}
{state===“PAUSED”&&<><button style={g.btnG} onClick={()=>clockAction(“END_PAUSE”)} disabled={actLoading}>▶ Reprendre</button><button style={g.btnR} onClick={()=>clockAction(“END”)} disabled={actLoading}>⏹ Finalitzar</button></>}
{state===“FINISHED”&&<div style={{…g.tag(C.green),padding:“12px 24px”,fontSize:14,width:“100%”,textAlign:“center”}}>✅ Jornada completada</div>}
</div>
)}
</div>
{entries.length>0&&(
<div style={g.card}>
<div style={{…g.h3,display:“flex”,justifyContent:“space-between”}}><span>Fitxades d’avui</span><button style={{…g.btnGh,padding:“3px 8px”,fontSize:11}} onClick={load}>↻ Actualitzar</button></div>
{entries.map((e,i)=>(
<div key={e.id} style={{display:“flex”,alignItems:“center”,gap:10,padding:“8px 0”,borderBottom:i<entries.length-1?`1px solid ${C.border}`:“none”}}>
<div style={{flex:1,fontSize:13}}>{eL[e.entry_type]||e.entry_type}</div>
<div style={{fontSize:12,color:C.textMid}}>{new Date(e.entry_datetime).toLocaleTimeString(“ca-ES”,{hour:“2-digit”,minute:“2-digit”,second:“2-digit”})}</div>
</div>
))}
</div>
)}
{summary&&(
<div style={{display:“flex”,gap:10}}>
<div style={g.stat}><div style={{...g.statV,color:C.green}}>{fmtPos(summary.theoretical_minutes||worker.daily_theoretical_minutes||480)}</div><div style={g.statL}>Teòric</div></div>
<div style={g.stat}><div style={{...g.statV,color:C.accent}}>{fmtPos(summary.worked_minutes||0)}</div><div style={g.statL}>Treballat</div></div>
<div style={g.stat}><div style={{...g.statV,color:(summary.balance_minutes||0)>=0?C.green:C.red}}>{fmt(summary.balance_minutes||0)}</div><div style={g.statL}>Saldo</div></div>
</div>
)}
</div>
<WNav cur="home" onNav={onNav}/>
</div>
);
}

function MonthHistory({worker,onBack,onDay,onNav}){
const [records,setRecords]=useState([]);
const [loading,setLoading]=useState(true);
const [err,setErr]=useState(””);
useEffect(()=>{
const today=new Date();
const from=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-01`;
sbGet(“daily_records”,`worker_id=eq.${worker.id}&work_date=gte.${from}&select=*&order=work_date.desc`)
.then(r=>{setRecords(r||[]);setLoading(false);})
.catch(e=>{setErr(e.message);setLoading(false);});
},[worker.id]);
const total=records.reduce((a,r)=>a+(r.worked_minutes||0),0);
const bal=records.reduce((a,r)=>a+(r.balance_minutes||0),0);
const inc=records.filter(r=>r.has_incidence).length;
return (
<div style={g.app}>
<div style={g.top}><button style={g.btnGh} onClick={onBack}>←</button><div style={{fontWeight:700}}>Historial</div><div style={{fontSize:12,color:C.textMid}}>{new Date().toLocaleDateString(“ca-ES”,{month:“long”,year:“numeric”})}</div></div>
<div style={g.body}>
{err&&<ErrBox msg={err}/>}
{loading?<Spinner/>:<>
<div style={{display:“flex”,gap:10,marginBottom:14}}>
<div style={g.stat}><div style={g.statV}>{fmtPos(total)}</div><div style={g.statL}>Treballat</div></div>
<div style={g.stat}><div style={{...g.statV,color:bal>=0?C.green:C.red}}>{fmt(bal)}</div><div style={g.statL}>Saldo</div></div>
<div style={g.stat}><div style={{...g.statV,color:inc>0?C.yellow:C.green}}>{inc}</div><div style={g.statL}>Incidències</div></div>
</div>
<div style={g.card}>
{records.length===0&&<div style={{color:C.textMid,textAlign:“center”,padding:20}}>Sense registres aquest mes</div>}
{records.map((r,i)=>(
<div key={r.id||i} onClick={()=>onDay(r)} style={{display:“flex”,alignItems:“center”,padding:“9px 0”,borderBottom:i<records.length-1?`1px solid ${C.border}`:“none”,gap:10,cursor:“pointer”}}>
<div style={{width:34,textAlign:“center”}}><div style={{fontSize:15,fontWeight:700}}>{r.work_date?.split(”-”)[2]}</div><div style={{fontSize:10,color:C.textDim}}>{dateLabel(r.work_date).split(” “)[0]}</div></div>
<div style={{flex:1}}><div style={{display:“flex”,alignItems:“center”,gap:6}}><span style={g.badge(sColor(r.status))}>{sLabel(r.status)}</span>{r.has_incidence&&<span style={g.badge(C.yellow)}>⚠</span>}</div>{r.worked_minutes>0&&<div style={{fontSize:11,color:C.textMid,marginTop:2}}>{fmtPos(r.worked_minutes)}</div>}</div>
<div style={{fontSize:13,fontWeight:600,color:(r.balance_minutes||0)>=0?C.green:C.red}}>{fmt(r.balance_minutes||0)}</div>
</div>
))}
</div>
</>}
</div>
<WNav cur="history" onNav={onNav}/>
</div>
);
}

function Permissions({worker,onBack,onNav}){
const [list,setList]=useState([]);
const [form,setForm]=useState({start_date:””,end_date:””,day_type:“VACATION”,comment:””});
const [loading,setLoading]=useState(true);
const [saving,setSaving]=useState(false);
const [err,setErr]=useState(””);
useEffect(()=>{
sbGet(“day_status”,`worker_id=eq.${worker.id}&is_active=eq.true&select=*&order=start_date.desc`)
.then(r=>{setList(r||[]);setLoading(false);})
.catch(e=>{setErr(e.message);setLoading(false);});
},[worker.id]);
const types={VACATION:{lb:“Vacances”,c:C.purple},SICK:{lb:“Baixa mèdica”,c:C.red},PAID_LEAVE:{lb:“Permís retribuït”,c:C.accent},HOLIDAY:{lb:“Festiu”,c:C.yellow}};
const add=async()=>{
if(!form.start_date)return;
setSaving(true);
try{
const rec=await sbPost(“day_status”,{worker_id:worker.id,start_date:form.start_date,end_date:form.end_date||form.start_date,day_type:form.day_type,compute_mode:“THEORETICAL_HOURS”,comment:form.comment,is_active:true});
setList(p=>[…(rec||[]),…p]);
setForm({start_date:””,end_date:””,day_type:“VACATION”,comment:””});
}catch(e){setErr(e.message);}
setSaving(false);
};
return (
<div style={g.app}>
<div style={g.top}><button style={g.btnGh} onClick={onBack}>←</button><div style={{fontWeight:700}}>Permisos</div><div/></div>
<div style={g.body}>
{err&&<ErrBox msg={err}/>}
<div style={g.card}>
<div style={g.h3}>Nou permís</div>
<div style={{display:“flex”,gap:10,marginBottom:10}}>
<div style={{flex:1}}><label style={g.lbl}>Data inici</label><input style={g.input} type=“date” value={form.start_date} onChange={e=>setForm(f=>({…f,start_date:e.target.value}))}/></div>
<div style={{flex:1}}><label style={g.lbl}>Data fi</label><input style={g.input} type=“date” value={form.end_date} onChange={e=>setForm(f=>({…f,end_date:e.target.value}))}/></div>
</div>
<label style={g.lbl}>Tipus</label>
<select style={{…g.input,marginBottom:10}} value={form.day_type} onChange={e=>setForm(f=>({…f,day_type:e.target.value}))}>
{Object.entries(types).map(([k,v])=><option key={k} value={k}>{v.lb}</option>)}

function App(){
const [screen,setScreen]=useState(“splash”);
const [worker,setWorker]=useState(null);
const [selDay,setSelDay]=useState(null);
const isAdmin=worker?.role===“admin”;
const login=()=>setScreen(“login”);
const success=(w)=>{setWorker(w);setScreen(w.role===“admin”?“adminHome”:“workerHome”);};
const logout=()=>{setWorker(null);setScreen(“splash”);};
const wNav=(id)=>{const map={home:“workerHome”,history:“monthHistory”,permissions:“permissions”,balance:“balance”,profile:“profile”};setScreen(map[id]||id);};
const aNav=(id)=>setScreen(id);

if(screen===“splash”) return <Splash onLogin={login}/>;
if(screen===“login”) return <LoginCode onBack={()=>setScreen(“splash”)} onSuccess={success}/>;
if(!isAdmin){
if(screen===“workerHome”) return <WorkerHome worker={worker} onLogout={logout} onNav={wNav}/>;
if(screen===“monthHistory”) return <MonthHistory worker={worker} onBack={()=>setScreen(“workerHome”)} onDay={r=>{setSelDay(r);setScreen(“dayDetail”);}} onNav={wNav}/>;
if(screen===“dayDetail”) return <div style={g.app}><div style={g.top}><button style={g.btnGh} onClick={()=>setScreen(“monthHistory”)}>←</button><div style={{fontWeight:700}}>Detall</div><div/></div><div style={g.body}><div style={g.card}><div style={{fontWeight:700,marginBottom:4}}>{selDay&&dateLabel(selDay.work_date)}</div><div style={{color:C.textMid,fontSize:13}}>Obre la versió completa per veure cronologia i edicions.</div></div></div></div>;
if(screen===“permissions”) return <Permissions worker={worker} onBack={()=>setScreen(“workerHome”)} onNav={wNav}/>;
if(screen===“balance”) return <Balance worker={worker} onBack={()=>setScreen(“workerHome”)} onNav={wNav}/>;
if(screen===“profile”) return <Profile worker={worker} onBack={()=>setScreen(“workerHome”)} onNav={wNav} onLogout={logout}/>;
}
if(isAdmin){
if(screen===“adminHome”) return <AdminHome worker={worker} onLogout={logout} onNav={aNav}/>;
if(screen===“workers”) return <WorkersPage onBack={()=>setScreen(“adminHome”)} onNav={aNav}/>;
if(screen===“records”) return <AllRecords onBack={()=>setScreen(“adminHome”)} onNav={aNav}/>;
if(screen===“allStatus”) return <AllDayStatus onBack={()=>setScreen(“adminHome”)} onNav={aNav}/>;
if(screen===“allBalances”) return <AllBalances onBack={()=>setScreen(“adminHome”)} onNav={aNav}/>;
if(screen===“exports”) return <Exports onBack={()=>setScreen(“adminHome”)} onNav={aNav}/>;
if(screen===“cards”) return <Cards onBack={()=>setScreen(“adminHome”)} onNav={aNav}/>;
if(screen===“settings”) return <Settings onBack={()=>setScreen(“adminHome”)} onNav={aNav}/>;
}
return <Splash onLogin={login}/>;
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>
