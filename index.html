ap(left,wn,dl,badge(t?t.lb:it.day_type,t?t.c:”#94A3B8”));
var isZero=it.compute_mode===“ZERO_HOURS”;
var sw=h(“div”); sw.style.cssText=“text-align:right;cursor:pointer”;
var swLbl=h(“div”); swLbl.style.cssText=“font-size:12px;font-weight:600;color:”+(isZero?”#EF4444”:”#22C55E”)+”;margin-bottom:4px”; swLbl.textContent=isZero?“0 hores”:“Teorica”;
var track=h(“div”); track.style.cssText=“width:34px;height:19px;border-radius:10px;background:”+(isZero?”#EF4444”:”#22C55E”)+”;position:relative;cursor:pointer;display:inline-block”;
var thumb=h(“div”); thumb.style.cssText=“width:15px;height:15px;border-radius:8px;background:#fff;position:absolute;top:2px;left:”+(isZero?“2px”:“17px”);
ap(track,thumb); ap(sw,swLbl,track);
sw.onclick=function(){
var nm=it.compute_mode===“ZERO_HOURS”?“THEORETICAL_HOURS”:“ZERO_HOURS”;
PATCH(“day_status”,“id=eq.”+it.id,{compute_mode:nm}).then(function(){ it.compute_mode=nm; renderList(); }).catch(function(){});
};
ap(row,left,sw); ap(card,row); ap(ld,card);
});
}
return root;
}

function pgAllBalances(){
var root=h(“div”); root.style.cssText=“display:flex;flex-direction:column;min-height:100vh;background:#0D0F14”;
ap(root,topBar(“Saldos globals”,function(){ go({screen:“adminHome”}); }));

ap(root,body,aNav(“ah”));

Promise.all([
GET(“workers”,“is_active=eq.true&select=id,display_name,daily_theoretical_minutes”),
GET(“daily_records”,“work_date=gte.”+from+”&select=worker_id,worked_minutes,balance_minutes”)

(results[0]||[]).forEach(function(w){

var c=h(“div”,“csm”); c.style.cursor=“default”;

ap(right,bv,bl); ap(c,av(w.display_name,42),info,right); ap(body,c);
});
}).catch(function(e){ ld.remove(); ap(body,errEl(e.message)); });
return root;
}

function pgSettings(){
var root=h(“div”); root.style.cssText=“display:flex;flex-direction:column;min-height:100vh;background:#0D0F14”;
ap(root,topBar(“Configuracio”,function(){ go({screen:“adminHome”}); }));
var body=h(“div”,“body”); var ld=spin(); ap(body,ld);
ap(root,body,aNav(“st”));
var settings=[];
GET(“app_settings”,“select=*”).then(function(s){
ld.remove(); settings=s||[];
if(!settings.length){ var emp=h(“div”,“info”); emp.textContent=“La taula app_settings es buida.”; ap(body,emp); return; }
var card=h(“div”,“card”); var ct=h(“div”,“h3”); ct.textContent=“Parametres globals”; ap(card,ct);
settings.forEach(function(s,i){
var row=h(“div”,“srow”); row.style.borderBottom=i<settings.length-1?“1px solid #252B3A”:“none”;
var kk=h(“div”); kk.style.cssText=“font-size:12px;font-family:monospace;color:#94A3B8”; kk.textContent=s.setting_key;
var vi=h(“input”,“inp”); vi.style.cssText=“width:140px;text-align:right”; vi.value=s.setting_value||””;
vi.oninput=function(e){ s.setting_value=e.target.value; };
ap(row,kk,vi); ap(card,row);
});
ap(body,card);
var sb=h(“button”,“btnP”); sb.textContent=“Guardar configuracio”;
sb.onclick=function(){
sb.textContent=“Guardant…”; sb.disabled=true;
var chain=Promise.resolve();
settings.forEach(function(s){ chain=chain.then(function(){ return PATCH(“app_settings”,“setting_key=eq.”+s.setting_key,{setting_value:s.setting_value}).catch(function(){}); }); });
chain.then(function(){ sb.textContent=“Guardat!”; setTimeout(function(){ sb.textContent=“Guardar configuracio”; sb.disabled=false; },2000); });
};
ap(body,sb);
}).catch(function(e){ ld.remove(); ap(body,errEl(e.message)); });
return root;
}

splash:pgSplash, login:pgLogin,

};

}

window.onerror=function(msg,src,line,col,err){
document.getElementById(“root”).innerHTML=”<div style='padding:20px;color:#EF4444;font-size:14px'><strong>Error JS:</strong><br>”+msg+”<br>Linia: “+line+”<br>”+String(err)+”</div>”;
return false;
};

try{ render(); }catch(e){
document.getElementById(“root”).innerHTML=”<div style='padding:20px;color:#EF4444;font-size:14px'><strong>Error en carregar:</strong><br>”+e.message+”</div>”;
}
</script>
