<!DOCTYPE html>

<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JASL Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0F14;color:#F1F5F9;font-family:-apple-system,sans-serif;padding:20px;font-size:15px}
.ok{color:#22C55E;margin:6px 0}
.err{color:#EF4444;margin:6px 0}
.info{color:#94A3B8;margin:6px 0;font-size:13px}
.btn{background:#3B82F6;color:#fff;border:none;border-radius:10px;padding:14px 20px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:12px}
.inp{background:#1C2130;border:1px solid #252B3A;border-radius:10px;padding:12px;color:#F1F5F9;font-size:18px;width:100%;outline:none;text-align:center;letter-spacing:6px;margin-top:8px}
h2{font-size:18px;font-weight:700;margin:16px 0 8px}
hr{border:none;border-top:1px solid #252B3A;margin:16px 0}
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:24px">
  <div style="font-size:48px">⏱</div>
  <div style="font-size:24px;font-weight:800">JASL<span style="color:#3B82F6">Time</span></div>
</div>

<h2>Diagnòstic de connexió</h2>
<div id="log"><div class="info">Iniciant proves…</div></div>

<hr>
<h2 id="loginTitle" style="display:none">Entrar</h2>
<div id="loginBox" style="display:none">
  <input class="inp" id="codeInp" type="password" placeholder="Codi" maxlength="10">
  <button class="btn" id="loginBtn">Entrar</button>
  <div id="loginErr"></div>
</div>

<div id="workerBox" style="display:none">
  <div id="workerName" style="font-size:20px;font-weight:700;margin-bottom:16px"></div>
  <button class="btn" id="startBtn">▶ Iniciar jornada</button>
  <button class="btn" id="pauseBtn" style="background:#F59E0B;color:#000;display:none">⏸ Pausa</button>
  <button class="btn" id="resumeBtn" style="background:#22C55E;display:none">▶ Reprendre</button>
  <button class="btn" id="endBtn" style="background:#EF4444;display:none">⏹ Finalitzar</button>
  <div id="clockState" style="margin-top:16px;font-size:13px;color:#94A3B8"></div>
  <div id="entriesList" style="margin-top:16px"></div>
</div>

<script>
const SB = "https://fywkafpfcnqynvjdedfj.supabase.co";
const KEY = "sb_publishable_9w912fn8EaE-84SAAV-Rww_xHKPipSv";
const log = document.getElementById("log");
let worker = null;
let entries = [];

function addLog(msg, type="info") {
  const d = document.createElement("div");
  d.className = type;
  d.textContent = msg;
  log.appendChild(d);
}

async function sbGet(table, query) {
  const r = await fetch(`${SB}/rest/v1/${table}?${query}`, {
    headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json"}
  });
  if(!r.ok) throw new Error("HTTP "+r.status+": "+await r.text());
  return r.json();
}

async function sbPost(table, body) {
  const r = await fetch(`${SB}/rest/v1/${table}`, {
    method:"POST",
    headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=representation"},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error("HTTP "+r.status+": "+await r.text());
  return r.json();
}

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// ── DIAGNÒSTIC ─────────────────────────────────────────────────────────────
async function runDiag() {
  addLog("1. Provant fetch bàsic a Supabase…");
  try {
    const res = await fetch(`${SB}/rest/v1/workers?select=id&limit=1`, {
      headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}
    });
    if(res.ok) {
      const data = await res.json();
      addLog("✅ Connexió a Supabase OK (HTTP 200)", "ok");
      addLog(`   → Resposta: ${JSON.stringify(data).slice(0,80)}`, "info");
    } else {
      addLog(`⚠️ Supabase respon HTTP ${res.status}`, "err");
      const t = await res.text();
      addLog(`   → ${t.slice(0,120)}`, "err");
    }
  } catch(e) {
    addLog("❌ Error de xarxa: "+e.message, "err");
    addLog("   → Possible bloqueig CORS o sense connexió", "info");
    return;
  }

  addLog("2. Provant taula workers…");
  try {
    const ws = await sbGet("workers","select=id,display_name,employee_code,role&limit=5");
    addLog(`✅ Taula workers OK — ${ws.length} registres trobats`, "ok");
    ws.forEach(w => addLog(`   · ${w.display_name} (${w.employee_code}) [${w.role}]`, "info"));
  } catch(e) {
    addLog("❌ Error taula workers: "+e.message, "err");
    addLog("   → Comprova RLS policies a Supabase", "info");
    return;
  }

  addLog("3. Provant taula time_entries…");
  try {
    const te = await sbGet("time_entries","select=id&limit=1");
    addLog(`✅ Taula time_entries OK — ${te.length} registres`, "ok");
  } catch(e) {
    addLog("❌ Error taula time_entries: "+e.message, "err");
  }

  addLog("4. Provant taula daily_records…");
  try {
    const dr = await sbGet("daily_records","select=id&limit=1");
    addLog(`✅ Taula daily_records OK — ${dr.length} registres`, "ok");
  } catch(e) {
    addLog("❌ Error taula daily_records: "+e.message, "err");
  }

  addLog("─── Tot correcte! Pots entrar ───", "ok");
  document.getElementById("loginTitle").style.display = "block";
  document.getElementById("loginBox").style.display = "block";
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
document.getElementById("loginBtn").addEventListener("click", async () => {
  const code = document.getElementById("codeInp").value.trim();
  const errD = document.getElementById("loginErr");
  const btn = document.getElementById("loginBtn");
  if(!code) return;
  btn.textContent = "Verificant…"; btn.disabled = true; errD.innerHTML = "";
  try {
    const ws = await sbGet("workers", `employee_code=eq.${code}&is_active=eq.true&select=*`);
    if(ws && ws.length > 0) {
      worker = ws[0];
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("loginTitle").style.display = "none";
      document.getElementById("workerBox").style.display = "block";
      document.getElementById("workerName").textContent = "👋 " + worker.display_name;
      loadEntries();
    } else {
      errD.innerHTML = '<div class="err">❌ Codi incorrecte</div>';
      btn.textContent = "Entrar"; btn.disabled = false;
    }
  } catch(e) {
    errD.innerHTML = `<div class="err">❌ ${e.message}</div>`;
    btn.textContent = "Entrar"; btn.disabled = false;
  }
});

// ── FITXATGE ───────────────────────────────────────────────────────────────
async function loadEntries() {
  try {
    entries = await sbGet("time_entries",
      `worker_id=eq.${worker.id}&entry_date=eq.${today()}&is_active=eq.true&select=*&order=entry_datetime.asc`);
    renderEntries();
  } catch(e) {
    document.getElementById("clockState").textContent = "Error: " + e.message;
  }
}

function getState() {
  if(!entries.length) return "NOT_STARTED";
  const last = entries[entries.length-1];
  if(last.entry_type==="END") return "FINISHED";
  if(last.entry_type==="START_PAUSE") return "PAUSED";
  return "RUNNING";
}

function renderEntries() {
  const st = getState();
  const labels = {NOT_STARTED:"Jornada no iniciada",RUNNING:"En curs ✅",PAUSED:"En pausa ⏸",FINISHED:"Finalitzada ✅"};
  document.getElementById("clockState").textContent = labels[st] || st;

  document.getElementById("startBtn").style.display = st==="NOT_STARTED"?"block":"none";
  document.getElementById("pauseBtn").style.display = st==="RUNNING"?"block":"none";
  document.getElementById("resumeBtn").style.display = st==="PAUSED"?"block":"none";
  document.getElementById("endBtn").style.display = (st==="RUNNING"||st==="PAUSED")?"block":"none";

  const el = document.getElementById("entriesList");
  const eL = {START:"▶️ Inici",END:"⏹️ Final",START_PAUSE:"⏸️ Pausa",END_PAUSE:"▶️ Represa"};
  el.innerHTML = entries.map(e =>
    `<div style="padding:6px 0;border-bottom:1px solid #252B3A;display:flex;justify-content:space-between;font-size:13px">
      <span>${eL[e.entry_type]||e.entry_type}</span>
      <span style="color:#94A3B8">${new Date(e.entry_datetime).toLocaleTimeString("ca-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span>
    </div>`
  ).join("");
}

async function doAction(type) {
  try {
    const pn = entries.filter(e=>e.entry_type==="START_PAUSE").length;
    await sbPost("time_entries", {
      worker_id: worker.id,
      entry_date: today(),
      entry_datetime: new Date().toISOString(),
      entry_type: type,
      pause_number: type==="START_PAUSE" ? pn+1 : null,
      source_method: "CODE",
      is_active: true
    });
    await loadEntries();
  } catch(e) {
    alert("Error: " + e.message);
  }
}

document.getElementById("startBtn").addEventListener("click", ()=>doAction("START"));
document.getElementById("pauseBtn").addEventListener("click", ()=>doAction("START_PAUSE"));
document.getElementById("resumeBtn").addEventListener("click", ()=>doAction("END_PAUSE"));
document.getElementById("endBtn").addEventListener("click", ()=>doAction("END"));

// ── INICI ──────────────────────────────────────────────────────────────────
runDiag();
</script>

</body>
</html>
