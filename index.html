<!DOCTYPE html>

<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JASL Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0F14;color:#F1F5F9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-text-size-adjust:100%}
input,select,textarea,button{font-family:inherit}
#root{display:flex;flex-direction:column;min-height:100vh}
.top{background:#151820;border-bottom:1px solid #252B3A;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.body{flex:1;padding:16px;max-width:640px;margin:0 auto;width:100%}
.card{background:#1C2130;border:1px solid #252B3A;border-radius:16px;padding:18px;margin-bottom:12px}
.csm{background:#1C2130;border:1px solid #252B3A;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer}
.nav{background:#151820;border-top:1px solid #252B3A;display:flex;position:sticky;bottom:0;z-index:100;flex-shrink:0}
.nav button{flex:1;padding:10px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;font-size:9px;color:#475569;line-height:1.4}
.nav button.on{color:#3B82F6;font-weight:700}
.ico{font-size:20px}
.btnP{background:#3B82F6;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
.btnG{background:#22C55E;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;flex:1}
.btnY{background:#F59E0B;color:#000;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;flex:1}
.btnR{background:#EF4444;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;flex:1}
.btnGh{background:transparent;color:#94A3B8;border:1px solid #252B3A;border-radius:9px;padding:8px 14px;font-size:13px;cursor:pointer}
.inp{background:#151820;border:1px solid #252B3A;border-radius:10px;padding:12px 14px;color:#F1F5F9;font-size:15px;width:100%;outline:none;-webkit-appearance:none}
.brow{display:flex;gap:10px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #252B3A}
.stats{display:flex;gap:8px;margin-bottom:12px}
.stat{background:#151820;border-radius:12px;padding:12px;flex:1;text-align:center}
.sv{font-size:18px;font-weight:700}
.sl{font-size:10px;color:#94A3B8;margin-top:2px}
.clk{font-size:44px;font-weight:700;letter-spacing:-2px;text-align:center;margin:6px 0}
.h3{font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lbl{font-size:12px;color:#94A3B8;margin-bottom:4px;display:block}
.divl{height:1px;background:#252B3A;margin:14px 0}
.err{background:#EF444418;border:1px solid #EF444444;border-radius:10px;padding:10px 14px;font-size:13px;color:#EF4444;margin-bottom:10px}
.info{background:#3B82F611;border:1px solid #3B82F633;border-radius:10px;padding:12px;font-size:13px;color:#94A3B8;margin-bottom:12px}
.ok{background:#22C55E11;border:1px solid #22C55E33;border-radius:10px;padding:10px 14px;font-size:13px;color:#22C55E;margin-bottom:10px}
.loading{text-align:center;padding:36px;color:#94A3B8;font-size:14px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;display:inline-block}
.tag{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;display:inline-block;border:1px solid transparent;margin-bottom:12px}
.av{border-radius:50%;background:#3B82F633;display:flex;align-items:center;justify-content:center;font-weight:700;color:#3B82F6;flex-shrink:0}
.tabs{display:flex;background:#151820;border-radius:10px;padding:3px;margin-bottom:14px;gap:3px}
.tab{flex:1;padding:7px;border-radius:8px;border:none;cursor:pointer;font-size:13px;color:#94A3B8;background:transparent}
.tab.on{background:#1C2130;color:#F1F5F9;font-weight:600}
.hrow{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid #252B3A;gap:10px;cursor:pointer}
.erow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #252B3A;font-size:13px}
select option{background:#1C2130;color:#F1F5F9}
</style>
</head>
<body>
<div id="root"><div class="loading">⏳ Carregant JASL Time…</div></div>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SB = "https://fywkafpfcnqynvjdedfj.supabase.co";
const KEY = "sb_publishable_9w912fn8EaE-84SAAV-Rww_xHKPipSv";

async function api(method, table, query, body) {
const url = SB+”/rest/v1/”+table+(query?”?”+query:””);
const r = await fetch(url, {
method: method||“GET”,
headers:{“apikey”:KEY,“Authorization”:“Bearer “+KEY,“Content-Type”:“application/json”,“Prefer”:“return=representation”},
body: body ? JSON.stringify(body) : undefined
});
const t = await r.text();
if(!r.ok) throw new Error(“HTTP “+r.status+”: “+t);
return t ? JSON.parse(t) : null;
}
const GET  = (t,q)   => api(“GET”,t,q);
const POST = (t,b)   => api(“POST”,t,null,b);
const PATCH= (t,q,b) => api(“PATCH”,t,q,b);

// ── UTILS ───────────────────────────────────────────────────────────────────
const fmt  = m => { const s=m<0?”-”:”+”,a=Math.abs(m); return s+pad(Math.floor(a/60))+“h”+pad(a%60)+“m”; };
const fmtP = m => pad(Math.floor(m/60))+“h”+pad(m%60)+“m”;
const fmtS = s => pad(Math.floor(s/3600))+”:”+pad(Math.floor((s%3600)/60))+”:”+pad(s%60);
const pad  = n => String(n).padStart(2,“0”);
const tNow = () => { const n=new Date(); return pad(n.getHours())+”:”+pad(n.getMinutes()); };
const toDay= () => { const d=new Date(); return d.getFullYear()+”-”+pad(d.getMonth()+1)+”-”+pad(d.getDate()); };
const dLbl = d => new Date(d+“T12:00:00”).toLocaleDateString(“ca-ES”,{weekday:“short”,day:“numeric”,month:“short”});
const SC   = s => ({CLOSED:”#22C55E”,VACATION:”#A855F7”,SICK:”#F59E0B”,WEEKEND:”#475569”,OPEN:”#3B82F6”,NOT_STARTED:”#475569”})[s]||”#475569”;
const SL   = s => ({CLOSED:“Tancat”,VACATION:“Vacances”,SICK:“Baixa”,WEEKEND:“Cap de setmana”,OPEN:“En curs”,NOT_STARTED:“Pendent”})[s]||s;
const EL   = {“START”:“▶️ Inici”,“END”:“⏹️ Final”,“PAUSE_START”:“⏸️ Pausa”,“PAUSE_END”:“▶️ Represa”};

// DOM
function h(tag,cls,attrs){
const e=document.createElement(tag);
if(cls)e.className=cls;
if(attrs)Object.entries(attrs).forEach(([k,v])=>{
if(k===“style”)Object.assign(e.style,v);
else if(k.startsWith(“on”))e.addEventListener(k.slice(2).toLowerCase(),v);
else e.setAttribute(k,v);
});
return e;
}
function ap(p,…kids){kids.flat().forEach(k=>{if(k!=null)p.appendChild(typeof k===“string”?document.createTextNode(k):k)});return p}
function av(name,sz){const e=h(“div”,“av”,{style:{width:sz+“px”,height:sz+“px”,fontSize:(sz*.38)+“px”}});e.textContent=(name||”?”).split(” “).map(n=>n[0]).slice(0,2).join(””).toUpperCase();return e}
function badge(t,c){const e=h(“span”,“badge”);e.style.background=c+“22”;e.style.color=c;e.textContent=t;return e}
function tag2(t,c){const e=h(“span”,“tag”);e.style.background=c+“18”;e.style.color=c;e.style.borderColor=c+“44”;e.textContent=t;return e}
function spin(){const e=h(“div”,“loading”);e.textContent=“⏳ Carregant…”;return e}
function errEl(m){const e=h(“div”,“err”);e.textContent=“❌ “+m;return e}

// ── STATE ───────────────────────────────────────────────────────────────────
let S={screen:“splash”,worker:null,selDay:null};
let _clkIv=null, _elIv=null;

function go(upd){
if(_clkIv){clearInterval(_clkIv);_clkIv=null}
if(_elIv){clearInterval(_elIv);_elIv=null}
S={…S,…upd};
window.onerror=function(msg,src,line,col,err){
document.getElementById(“root”).innerHTML=”<div style="padding:20px;color:#EF4444;font-size:14px"><strong>Error JavaScript:</strong><br>”+msg+”<br><br>Línia: “+line+”<br><br>”+String(err)+”</div>”;
return false;
};
try{
render();
}catch(e){
document.getElementById(“root”).innerHTML=”<div style="padding:20px;color:#EF4444;font-size:14px"><strong>Error en carregar:</strong><br>”+e.message+”</div>”;
}
}

// ── TOP & NAV ───────────────────────────────────────────────────────────────
function topBar(title,onBack,right){
const t=h(“div”,“top”);
const back=onBack?ap(h(“button”,“btnGh”,{onClick:onBack}),“← Tornar”):h(“div”,””,{style:{width:“70px”}});
const tt=h(“div”,””,{style:{fontWeight:“700”,fontSize:“16px”}});tt.textContent=title;
ap(t,back,tt,right||h(“div”,””,{style:{width:“70px”}}));
return t;
}
function wNav(cur){
const nav=h(“nav”,“nav”);
[[“workerHome”,“🏠”,“Avui”,“h”],[“monthHistory”,“📋”,“Historial”,“hi”],[“permissions”,“🛡”,“Permisos”,“p”],[“balance”,“⚖️”,“Saldo”,“b”],[“profile”,“👤”,“Perfil”,“pr”]].forEach(([sc,ic,lb,id])=>{
const btn=h(“button”,cur===id?“on”:””,{onClick:()=>go({screen:sc})});
ap(btn,ap(h(“span”,“ico”),ic),ic+” “+lb);
btn.innerHTML=”<span class='ico'>”+ic+”</span><span>”+lb+”</span>”;
btn.className=cur===id?“on”:””;
btn.onclick=()=>go({screen:sc});
ap(nav,btn);
});
return nav;
}
function aNav(cur){
const nav=h(“nav”,“nav”);
[[“adminHome”,“🏠”,“Inici”,“ah”],[“workers”,“👥”,“Equip”,“wk”],[“records”,“📋”,“Registres”,“rc”],[“exports”,“⬇️”,“Exports”,“ex”],[“settings”,“⚙️”,“Config.”,“st”]].forEach(([sc,ic,lb,id])=>{
const btn=h(“button”,cur===id?“on”:””);
btn.innerHTML=”<span class='ico'>”+ic+”</span><span>”+lb+”</span>”;
btn.onclick=()=>go({screen:sc});
ap(nav,btn);
});
return nav;
}

// ══════════════════════════════════════════════════════════════════════════
// SPLASH
// ══════════════════════════════════════════════════════════════════════════
function pgSplash(){
const root=h(“div”,””,{style:{display:“flex”,flexDirection:“column”,minHeight:“100vh”,justifyContent:“center”,alignItems:“center”,padding:“32px”,background:”#0D0F14”}});
ap(root,ap(h(“div”,””,{style:{textAlign:“center”,maxWidth:“300px”}}),
ap(h(“div”,””,{style:{fontSize:“60px”,marginBottom:“8px”}}),“⏱”),
ap(h(“div”,””,{style:{fontSize:“28px”,fontWeight:“800”,marginBottom:“4px”}}),“JASL”,ap(h(“span”,””,{style:{color:”#3B82F6”}}),“Time”)),
ap(h(“div”,””,{style:{fontSize:“14px”,color:”#94A3B8”,marginBottom:“32px”}}),“Registre de jornada intel·ligent”),
ap(h(“button”,“btnP”,{onClick:()=>go({screen:“login”})}),“Entrar amb codi personal”)
));
return root;
}

// ══════════════════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════════════════
function pgLogin(){
const root=h(“div”,””,{style:{display:“flex”,flexDirection:“column”,minHeight:“100vh”,background:”#0D0F14”}});
ap(root,topBar(“JASL Time”,()=>go({screen:“splash”})));
const body=h(“div”,“body”,{style:{display:“flex”,flexDirection:“column”,justifyContent:“center”}});
const errD=h(“div”);
const inp=h(“input”,“inp”,{type:“password”,placeholder:”••••”,maxlength:“20”,style:{fontSize:“22px”,textAlign:“center”,letterSpacing:“8px”,marginBottom:“14px”}});
const btn=h(“button”,“btnP”);btn.textContent=“Entrar”;
btn.onclick=async()=>{
const code=inp.value.trim();if(!code)return;
btn.textContent=“Verificant…”;btn.disabled=true;errD.innerHTML=””;
try{
const ws=await GET(“workers”,“employee_code=eq.”+code+”&is_active=eq.true&select=*”);
if(ws&&ws.length){go({worker:ws[0],screen:ws[0].role===“ADMIN”?“adminHome”:“workerHome”});}
else{ap(errD,errEl(“Codi incorrecte o treballador inactiu.”));btn.textContent=“Entrar”;btn.disabled=false;}
}catch(e){ap(errD,errEl(e.message));btn.textContent=“Entrar”;btn.disabled=false;}
};
inp.onkeydown=e=>e.key===“Enter”&&btn.onclick();
ap(body,ap(h(“div”,“card”,{style:{textAlign:“center”}}),
ap(h(“div”,””,{style:{fontSize:“40px”,marginBottom:“8px”}}),“🔐”),
ap(h(“div”,””,{style:{fontSize:“22px”,fontWeight:“700”,marginBottom:“4px”}}),“Identificació”),
ap(h(“div”,””,{style:{fontSize:“13px”,color:”#94A3B8”,marginBottom:“20px”}}),“Introdueix el teu codi personal”),
inp,errD,btn
));
ap(root,body);return root;
}

// ══════════════════════════════════════════════════════════════════════════
// WORKER HOME
// ══════════════════════════════════════════════════════════════════════════
function pgWorkerHome(){
const w=S.worker;
const root=h(“div”,””,{style:{display:“flex”,flexDirection:“column”,minHeight:“100vh”,background:”#0D0F14”}});
const top=h(“div”,“top”);
const wi=h(“div”,””,{style:{display:“flex”,alignItems:“center”,gap:“10px”}});
ap(wi,av(w.display_name,30),ap(h(“div”,””),ap(h(“div”,””,{style:{fontSize:“13px”,fontWeight:“600”}}),w.display_name),ap(h(“div”,””,{style:{fontSize:“11px”,color:”#94A3B8”}}),”#”+w.employee_code)));
const outBtn=h(“button”,“btnGh”,{onClick:()=>go({screen:“splash”,worker:null})});outBtn.textContent=“Sortir”;
ap(top,wi,outBtn);ap(root,top);

const body=h(“div”,“body”);
const errD=h(“div”);ap(body,errD);

// Clock card
const cc=h(“div”,“card”,{style:{textAlign:“center”}});
const stTag=h(“div”,””,{style:{marginBottom:“12px”}});
const clkEl=h(“div”,“clk”);clkEl.textContent=tNow();
const subEl=h(“div”,””,{style:{fontSize:“13px”,color:”#94A3B8”,marginBottom:“16px”}});
subEl.textContent=new Date().toLocaleDateString(“ca-ES”,{weekday:“long”,day:“numeric”,month:“long”});
const brow=h(“div”,“brow”);
const loadEl=h(“div”,””,{style:{color:”#94A3B8”,padding:“10px”,textAlign:“center”}});loadEl.textContent=“⏳ Carregant…”;
ap(cc,stTag,clkEl,subEl,loadEl,brow);ap(body,cc);

// Entries
const ec=h(“div”,“card”,{style:{display:“none”}});
const eList=h(“div”);
const eRefBtn=h(“button”,“btnGh”,{style:{padding:“3px 8px”,fontSize:“11px”},onClick:load});eRefBtn.textContent=“↻”;
const etRow=h(“div”,””,{style:{display:“flex”,justifyContent:“space-between”,marginBottom:“10px”}});
const et=h(“div”,“h3”);et.textContent=“Fitxades d’avui”;
ap(etRow,et,eRefBtn);ap(ec,etRow,eList);ap(body,ec);

// Stats
const sr=h(“div”,“stats”,{style:{display:“none”}});ap(body,sr);

ap(root,body,wNav(“h”));

_clkIv=setInterval(()=>{clkEl.textContent=tNow();},1000);
let entries=[],summary=null,actLoading=false,elapsed=0;

function getState(){
if(!entries.length)return”NOT_STARTED”;
const last=entries[entries.length-1];
if(last.entry_type===“END”)return”FINISHED”;
if(last.entry_type===“PAUSE_START”)return”PAUSED”;
return”RUNNING”;
}

function startElapsed(){
if(_elIv)clearInterval(_elIv);
let worked=0,lastStart=null;
for(const e of entries){
if(e.entry_type===“START”||e.entry_type===“PAUSE_END”)lastStart=new Date(e.entry_datetime);
if((e.entry_type===“PAUSE_START”||e.entry_type===“END”)&&lastStart){worked+=(new Date(e.entry_datetime)-lastStart);lastStart=null;}
}
const last=entries[entries.length-1];
if(lastStart&&last?.entry_type!==“END”){
const t0=lastStart.getTime();
_elIv=setInterval(()=>{elapsed=Math.floor((worked+Date.now()-t0)/1000);subEl.textContent=“Treballat: “+fmtS(elapsed);},1000);
}else{
elapsed=Math.floor(worked/1000);
subEl.textContent=elapsed>0?“Treballat: “+fmtS(elapsed):new Date().toLocaleDateString(“ca-ES”,{weekday:“long”,day:“numeric”,month:“long”});
}
}

function renderButtons(){
brow.innerHTML=””;
const st=getState();
const colors={NOT_STARTED:”#475569”,RUNNING:”#22C55E”,PAUSED:”#F59E0B”,FINISHED:”#3B82F6”};
const labels={NOT_STARTED:“Jornada no iniciada”,RUNNING:“Jornada en curs”,PAUSED:“En pausa”,FINISHED:“Jornada finalitzada”};
stTag.innerHTML=””;ap(stTag,tag2(labels[st],colors[st]));
if(st===“NOT_STARTED”){const b=h(“button”,“btnG”,{onClick:()=>doAction(“START”)});b.textContent=“▶ Iniciar jornada”;ap(brow,b);}
if(st===“RUNNING”){
const bp=h(“button”,“btnY”,{onClick:()=>doAction(“PAUSE_START”)});bp.textContent=“⏸ Pausa”;
const bf=h(“button”,“btnR”,{onClick:()=>doAction(“END”)});bf.textContent=“⏹ Finalitzar”;
ap(brow,bp,bf);
}
if(st===“PAUSED”){
const br=h(“button”,“btnG”,{onClick:()=>doAction(“PAUSE_END”)});br.textContent=“▶ Reprendre”;
const bf=h(“button”,“btnR”,{onClick:()=>doAction(“END”)});bf.textContent=“⏹ Finalitzar”;
ap(brow,br,bf);
}
if(st===“FINISHED”){const t=tag2(“✅ Jornada completada”,”#22C55E”);t.style.padding=“12px 24px”;t.style.width=“100%”;t.style.textAlign=“center”;ap(brow,t);}
}

function renderEntries(){
eList.innerHTML=””;
entries.forEach((e,i)=>{
const row=h(“div”,“erow”,{style:{borderBottom:i<entries.length-1?“1px solid #252B3A”:“none”}});
const lbl=h(“span”);lbl.textContent=EL[e.entry_type]||e.entry_type;
const t=h(“span”,””,{style:{color:”#94A3B8”}});t.textContent=new Date(e.entry_datetime).toLocaleTimeString(“ca-ES”,{hour:“2-digit”,minute:“2-digit”,second:“2-digit”});
ap(row,lbl,t);eList.appendChild(row);
});
ec.style.display=entries.length?””:“none”;
}

function renderStats(){
sr.innerHTML=””;
if(!summary){sr.style.display=“none”;return;}
sr.style.display=“flex”;
const bal=summary.balance_minutes||0;
[[“Teòric”,fmtP(summary.theoretical_minutes||w.daily_theoretical_minutes||480),”#22C55E”],
[“Treballat”,fmtP(summary.worked_minutes||0),”#3B82F6”],
[“Saldo”,fmt(bal),bal>=0?”#22C55E”:”#EF4444”]
].forEach(([lb,val,c])=>{
const s=h(“div”,“stat”);
const sv=h(“div”,“sv”);sv.style.color=c;sv.textContent=val;
const sl=h(“div”,“sl”);sl.textContent=lb;
ap(s,sv,sl);ap(sr,s);
});
}

async function doAction(type){
if(actLoading)return;
actLoading=true;
brow.innerHTML=”<div style='color:#94A3B8;padding:10px;text-align:center'>Guardant…</div>”;
try{
const pn=entries.filter(e=>e.entry_type===“PAUSE_START”).length;
await POST(“time_entries”,{
worker_id:w.id,entry_date:toDay(),entry_datetime:new Date().toISOString(),
entry_type:type,
pause_number:type===“PAUSE_START”?pn+1:type===“PAUSE_END”?pn:null,
source_method:“CODE”,is_active:true,created_by_worker_id:w.id
});
await load();
}catch(e){ap(errD,errEl(e.message));}
actLoading=false;
}

async function load(){
try{
const td=toDay();
const [recs,ents]=await Promise.all([
GET(“daily_records”,“worker_id=eq.”+w.id+”&work_date=eq.”+td+”&select=*”),
GET(“time_entries”,“worker_id=eq.”+w.id+”&entry_date=eq.”+td+”&is_active=eq.true&select=*&order=entry_datetime.asc”),
]);
summary=recs?.[0]||null;entries=ents||[];
loadEl.style.display=“none”;
renderButtons();renderEntries();renderStats();startElapsed();
}catch(e){loadEl.style.display=“none”;ap(errD,errEl(e.message));renderButtons();}
}
load();
return root;
}

// ══════════════════════════════════════════════════════════════════════════
// MONTH HISTORY
// ══════════════════════════════════════════════════════════════════════════
function pgMonthHistory(){
const w=S.worker;
const root=h(“div”,””,{style:{display:“flex”,flexDirection:“column”,minHeight:“100vh”,background:”#0D0F14”}});
const mnEl=h(“span”,””,{style:{fontSize:“12px”,color:”#94A3B8”}});
mnEl.textContent=new Date().toLocaleDateString(“ca-ES”,{month:“long”,year:“numeric”});
ap(root,topBar(“Historial”,()=>go({screen:“workerHome”}),mnEl));
const body=h(“div”,“body”);
const loadEl=spin();ap(body,loadEl);
ap(root,body,wNav(“hi”));

(async()=>{

const balEl=h(“div”,””,{style:{fontSize:“13px”,fontWeight:“600”,color:(r.balance_minutes||0)>=0?”#22C55E”:”#EF4444”,minWidth:“50px”,textAlign:“right”}});
balEl.textContent=fmt(r.balance_minutes||0);
ap(row,av(workers[r.worker_id]||”?”,30),mid,right,balEl);ap(ld,row);
});
}
return root;
}

// ══════════════════════════════════════════════════════════════════════════
// ALL STATUS (PERMISOS GLOBALS)
// ══════════════════════════════════════════════════════════════════════════
function pgAllStatus(){
const root=h(“div”,””,{style:{display:“flex”,flexDirection:“column”,minHeight:“100vh”,background:”#0D0F14”}});
ap(root,topBar(“Permisos globals”,()=>go({screen:“adminHome”})));
const body=h(“div”,“body”);
ap(body,ap(h(“div”,“info”),“Com a administrador pots canviar el còmput de cada permís.”));
const ld=h(“div”,{},spin());ap(body,ld);
ap(root,body,aNav(“ah”));
const types={VACATION:{lb:“Vacances”,c:”#A855F7”},SICK:{lb:“Baixa”,c:”#EF4444”},PAID_LEAVE:{lb:“Permís retribuït”,c:”#3B82F6”},HOLIDAY:{lb:“Festiu”,c:”#F59E0B”}};
let items=[],workers={};

Promise.all([
GET(“day_status”,“is_active=eq.true&select=*&order=start_date.desc&limit=50”),
GET(“workers”,“select=id,display_name”),
]).then(([ds,ws])=>{
const wMap={};(ws||[]).forEach(w=>{wMap[w.id]=w.display_name;});
workers=wMap;items=ds||[];renderList();
}).catch(e=>{ld.innerHTML=””;ap(ld,errEl(e.message));});

function renderList(){
ld.innerHTML=””;
if(!items.length){const e=h(“div”,””,{style:{color:”#94A3B8”,textAlign:“center”}});e.textContent=“Sense permisos registrats”;ap(ld,e);return;}
items.forEach(it=>{
const t=types[it.day_type];
const card=h(“div”,“card”);const row=h(“div”,“row”);
const left=h(“div”);
const wn=h(“div”,””,{style:{fontWeight:“600”,marginBottom:“2px”}});wn.textContent=workers[it.worker_id]||it.worker_id;
const dl=h(“div”,””,{style:{fontSize:“12px”,color:”#94A3B8”,marginBottom:“4px”}});dl.textContent=it.start_date+(it.end_date!==it.start_date?” → “+it.end_date:””);
ap(left,wn,dl,badge(t?.lb||it.day_type,t?.c||”#94A3B8”));
const isZero=it.compute_mode===“ZERO_HOURS”;
const swLbl=h(“div”,””,{style:{fontSize:“12px”,fontWeight:“600”,color:isZero?”#EF4444”:”#22C55E”,marginBottom:“4px”,textAlign:“right”}});swLbl.textContent=isZero?“0 hores”:“Teòric”;
const track=h(“div”,””,{style:{width:“34px”,height:“19px”,borderRadius:“10px”,background:isZero?”#EF4444”:”#22C55E”,position:“relative”,cursor:“pointer”}});
const thumb=h(“div”,””,{style:{width:“15px”,height:“15px”,borderRadius:“8px”,background:”#fff”,position:“absolute”,top:“2px”,left:isZero?“2px”:“17px”}});
ap(track,thumb);
const sw=h(“div”,””,{style:{textAlign:“right”,cursor:“pointer”}});
ap(sw,swLbl,track);
sw.onclick=async()=>{
const nm=it.compute_mode===“ZERO_HOURS”?“THEORETICAL_HOURS”:“ZERO_HOURS”;
await PATCH(“day_status”,“id=eq.”+it.id,{compute_mode:nm}).catch(()=>{});
it.compute_mode=nm;renderList();
};
ap(row,left,sw);ap(card,row);ap(ld,card);
});
}
return root;
}

// ══════════════════════════════════════════════════════════════════════════
// ALL BALANCES
// ══════════════════════════════════════════════════════════════════════════
function pgAllBalances(){
const root=h(“div”,””,{style:{display:“flex”,flexDirection:“column”,minHeight:“100vh”,background:”#0D0F14”}});
ap(root,topBar(“Saldos globals”,()=>go({screen:“adminHome”})));
const body=h(“div”,“body”);const ld=spin();ap(body,ld);
ap(root,body,aNav(“ah”));
const td=new Date();const from=td.getFullYear()+”-”+pad(td.getMonth()+1)+”-01”;
Promise.all([
GET(“workers”,“is_active=eq.true&select=id,display_name,daily_theoretical_minutes”),
GET(“daily_records”,“work_date=gte.”+from+”&select=worker_id,worked_minutes,balance_minutes”),
]).then(([ws,recs])=>{
ld.remove();
const byW={};(recs||[]).forEach(r=>{if(!byW[r.worker_id])byW[r.worker_id]={worked:0,balance:0};byW[r.worker_id].worked+=r.worked_minutes||0;byW[r.worker_id].balance+=r.balance_minutes||0;});
(ws||[]).forEach(w=>{
const d=byW[w.id]||{worked:0,balance:0};
const c=h(“div”,“csm”);c.style.cursor=“default”;
const info=h(“div”,””,{style:{flex:“1”}});
const l1=h(“div”,””,{style:{fontWeight:“600”}});l1.textContent=w.display_name;
const l2=h(“div”,””,{style:{fontSize:“11px”,color:”#94A3B8”}});l2.textContent=fmtP(d.worked)+” treballades”;
ap(info,l1,l2);
const right=h(“div”,””,{style:{textAlign:“right”}});
const bv=h(“div”,””,{style:{fontSize:“18px”,fontWeight:“700”,color:d.balance>=0?”#22C55E”:”#EF4444”}});bv.textContent=fmt(d.balance);
const bl=h(“div”,””,{style:{fontSize:“10px”,color:”#94A3B8”}});bl.textContent=“saldo mensual”;
ap(right,bv,bl);ap(c,av(w.display_name,42),info,right);ap(body,c);
});
}).catch(e=>{ld.remove();ap(body,errEl(e.message));});
return root;
}

// SETTINGS
// ══════════════════════════════════════════════════════════════════════════
function pgSettings(){
const root=h(“div”,””,{style:{display:“flex”,flexDirection:“column”,minHeight:“100vh”,background:”#0D0F14”}});
ap(root,topBar(“Configuració”,()=>go({screen:“adminHome”})));
const body=h(“div”,“body”);const ld=spin();ap(body,ld);
ap(root,body,aNav(“st”));
let settings=[];
GET(“app_settings”,“select=*”).then(s=>{
ld.remove();settings=s||[];
if(!settings.length){ap(body,ap(h(“div”,“info”),“La taula app_settings és buida.”));return;}
const card=h(“div”,“card”);const ct=h(“div”,“h3”);ct.textContent=“Paràmetres globals”;ap(card,ct);
settings.forEach((s,i)=>{
const row=h(“div”,“srow”,{style:{borderBottom:i<settings.length-1?“1px solid #252B3A”:“none”}});
const kk=h(“div”,””,{style:{fontSize:“12px”,fontFamily:“monospace”,color:”#94A3B8”}});kk.textContent=s.setting_key;
const vi=h(“input”,“inp”,{style:{width:“140px”,textAlign:“right”}});vi.value=s.setting_value||””;
vi.oninput=e=>{s.setting_value=e.target.value;};
ap(row,kk,vi);ap(card,row);
});
ap(body,card);
const sb=h(“button”,“btnP”);sb.textContent=“Guardar configuració”;
sb.onclick=async()=>{
sb.textContent=“Guardant…”;sb.disabled=true;
for(const s of settings){await PATCH(“app_settings”,“setting_key=eq.”+s.setting_key,{setting_value:s.setting_value}).catch(()=>{});}
sb.textContent=“✅ Guardat!”;setTimeout(()=>{sb.textContent=“Guardar configuració”;sb.disabled=false;},2000);
};
ap(body,sb);
}).catch(e=>{ld.remove();ap(body,errEl(e.message));});
return root;
}

// ══════════════════════════════════════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════════════════════════════════════
function render(){
const root=document.getElementById(“root”);
root.innerHTML=””;
const pages={
splash:pgSplash,login:pgLogin,
workerHome:pgWorkerHome,monthHistory:pgMonthHistory,dayDetail:pgDayDetail,
permissions:pgPermissions,balance:pgBalance,profile:pgProfile,
adminHome:pgAdminHome,workers:pgWorkers,records:pgRecords,
allStatus:pgAllStatus,allBalances:pgAllBalances,
exports:pgExports,cards:pgCards,settings:pgSettings,
};
root.appendChild((pages[S.screen]||pgSplash)());
}

window.onerror=function(msg,src,line,col,err){
document.getElementById(“root”).innerHTML=”<div style="padding:20px;color:#EF4444;font-size:14px"><strong>Error JavaScript:</strong><br>”+msg+”<br><br>Línia: “+line+”<br><br>”+String(err)+”</div>”;
return false;
};
try{
render();
}catch(e){
document.getElementById(“root”).innerHTML=”<div style="padding:20px;color:#EF4444;font-size:14px"><strong>Error en carregar:</strong><br>”+e.message+”</div>”;
}
</script>
